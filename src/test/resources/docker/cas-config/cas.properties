server.port=7080
server.servlet.context-path=/cas
server.ssl.enabled=false

cas.server.name=http://localhost:7080
cas.server.prefix=${cas.server.name}${server.servlet.context-path}
cas.tgc.secure=false
cas.service-registry.core.init-from-json=true
cas.service-registry.json.location=file:/tmp/cas

cas.authn.accept.users=
cas.authn.ldap[0].type=AUTHENTICATED
cas.authn.ldap[0].ldap-url=ldap://openldap:389
cas.authn.ldap[0].base-dn=dc=example,dc=org
cas.authn.ldap[0].subtree-search=true
cas.authn.ldap[0].search-filter=uid={user}
cas.authn.ldap[0].bind-dn=cn=admin,dc=example,dc=org
cas.authn.ldap[0].bind-credential=admin
cas.authn.ldap[0].principal-attribute-id=uid




