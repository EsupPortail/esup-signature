server.port=7080
server.ssl.enabled=false
cas.locale.cookie.secure=false
cas.tgc.secure=false
cas.tgc.same-site-policy=Strict
cas.slo.asynchronous=false
cas.service-registry.core.init-from-json=true
cas.authn.accept.users=
cas.authn.attributeRepository.core.defaultAttributesToRelease=uid,mail,sn,cn,memberOf
cas.authn.attribute-repository.core.expiration-time = 0

cas.authn.ldap[0].type=DIRECT
cas.authn.ldap[0].ldap-url=ldap://localhost:3980
cas.authn.ldap[0].dn-format=uid=%s,ou=people,dc=example,dc=org
cas.authn.ldap[0].poolPassivator=NONE
cas.authn.ldap[0].baseDn=ou=people,dc=example,dc=org
cas.authn.ldap[0].searchFilter=(&(uid={user})(objectclass=inetOrgPerson))
cas.authn.ldap[0].principalAttributeList=

cas.authn.attributeRepository.ldap[0].ldap-url=ldap://localhost:3980
cas.authn.attributeRepository.ldap[0].baseDn=ou=people,dc=example,dc=org
cas.authn.attributeRepository.ldap[0].searchFilter=(&(uid={user})(objectclass=inetOrgPerson))
cas.authn.attributeRepository.ldap[0].bindDn=cn=admin,dc=example,dc=org
cas.authn.attributeRepository.ldap[0].bindCredential=admin
cas.authn.attributeRepository.ldap[0].attributes.uid=uid
cas.authn.attributeRepository.ldap[0].attributes.mail=mail
cas.authn.attributeRepository.ldap[0].attributes.cn=cn
cas.authn.attributeRepository.ldap[0].attributes.sn=sn
cas.authn.attributeRepository.ldap[0].attributes.memberOf=memberOf

logging.level.org.apereo.cas.logout=TRACE
logging.level.org.apereo.cas.authentication.mfa=DEBUG

# MFA Esup Otp Authentication
#cas.authn.mfa.triggers.global.global-provider-id=mfa-esupotp
cas.authn.mfa.groovy-script.location=file:/etc/cas/config/mfaGroovyTrigger.groovy

# Add translations, you will need to check what are the default from CAS "Message Bundles" properties
cas.messageBundle.baseNames=classpath:custom_messages,classpath:messages,classpath:esupotp_message

# Add your esup-otp-api in Content-Security-Policy:
cas.http-web-request.header.content-security-policy=script-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:3000/; object-src 'none'; worker-src 'self' blob: 'unsafe-inline' 
