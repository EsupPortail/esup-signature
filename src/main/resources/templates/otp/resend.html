<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-lite :: head}"></head>
<body>
<header th:replace="~{fragments/nav-empty :: nav-empty}"></header>
<main role="main">
    <div class="wrapper">
        <div id="content" class="content-full">
            <div class="success-container">
                <div class="alert alert-light">
                    <div class="success-icon text-success">
                        <i class="fi fi-rr-check-circle" style="font-size: 6em;"></i>
                    </div>

                    <h4>Lien envoyé avec succès</h4>
                    <p class="success-description">
                        Un nouveau lien de signature vous a été envoyé par email.
                    </p>

                    <form th:action="@{/otp-access/resend}" method="post" th:object="${otp}" class="expired-form">
                        <input type="hidden" th:field="*{urlId}" />
                        <button type="submit" class="btn btn-primary btn-lg">
                            Renvoyer un nouveau lien
                        </button>
                    </form>

                    <div class="success-info">
                        <p>Vous devriez le recevoir dans les prochaines minutes.</p>
                        <p>Si vous ne le recevez pas, vérifiez votre dossier spam ou réessayez.</p>
                    </div>


                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer-light :: footer}"></footer>

<style>
    .success-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        padding: 2rem 1rem;
        margin-top: 30px;
    }

    .success-icon {
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
    }

    .success-description {
        font-size: 1rem;
        color: #666;
        line-height: 1.5;
        margin-bottom: 2rem;
        text-align: center;
    }

    .success-info {
        background: #f8f9fa;
        border-left: 4px solid #198754;
        padding: 1.25rem;
        border-radius: 6px;
        text-align: left;
    }

    .expired-form {
        margin-bottom: 2rem;
    }

    .btn-primary {
        background: #0d6efd;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
        width: 100%;
    }


    .success-info p {
        font-size: 0.95rem;
        color: #495057;
        margin: 0.5rem 0;
        line-height: 1.5;
    }

    .success-info p:first-child {
        font-weight: 500;
    }

    @media (max-width: 640px) {
        .success-description {
            font-size: 0.95rem;
        }
    }
</style>
</body>
</html>
