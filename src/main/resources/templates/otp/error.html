<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-lite :: head}"></head>
<body>
<header th:replace="~{fragments/nav-empty :: nav-empty}"></header>
<main role="main">
    <div class="es-wrapper">
        <div id="content" class="es-content-full">
            <div class="es-auth-page">
                <div class="alert alert-light es-auth-card">
                    <div class="es-auth-illustration es-auth-illustration--danger">
                        <i class="fi fi-rr-octagon-xmark es-auth-illustration-icon"></i>
                    </div>

                    <h4>Une erreur s’est produite.</h4>

                    <div class="es-auth-message" th:utext="${errorMsg}">
                    </div>

                    <form th:if="${#authorization.expression('hasRole(''ROLE_OTP'')')}"
                        th:action="@{/logout}"
                        method="post"
                        class="es-auth-form">
                        <button type="submit" class="es-auth-button">
                            <i class="fa-solid fa-power-off"></i> Déconnexion
                        </button>
                    </form>

                    <div class="es-auth-panel es-auth-panel--danger">
                        <p>Si le problème persiste, veuillez contacter le créateur de la demande (mentionné dans votre premier email).</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer-light :: footer}"></footer>
</body>
</html>
