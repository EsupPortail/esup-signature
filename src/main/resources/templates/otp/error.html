<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-lite :: head}"></head>
<body>
<header th:replace="~{fragments/nav-empty :: nav-empty}"></header>
<main role="main">
    <div class="wrapper">
        <div id="content" class="content-full">
            <div class="error-container">
                <div class="alert alert-light">
                    <div class="error-icon text-danger">
                        <i class="fi fi-rr-octagon-xmark" style="font-size: 6em;"></i>
                    </div>

                    <h4>Une erreur s’est produite.</h4>

                    <div class="error-message" th:utext="${errorMsg}">
                    </div>

                    <form th:if="${#authorization.expression('hasRole(''ROLE_OTP'')')}"
                        th:action="@{/logout}"
                        method="post"
                        class="error-form">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fa-solid fa-power-off"></i> Déconnexion
                        </button>
                    </form>

                    <div class="error-info">
                        <p>Si le problème persiste, veuillez contacter le créateur de la demande (mentionné dans votre premier email).</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer-light :: footer}"></footer>

<style>
    .error-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        padding: 2rem 1rem;
        margin-top: 30px;
    }

    .error-icon {
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
    }

    .error-form {
        margin-bottom: 2rem;
    }

    .btn-primary {
        background: #0d6efd;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        width: 100%;
    }

    .btn-primary:hover {
        background: #0b5ed7;
        box-shadow: 0 2px 8px rgba(13, 110, 253, 0.3);
    }

    .btn-primary:active {
        background: #0a58ca;
        transform: translateY(1px);
    }

    .error-info {
        background: #f8f9fa;
        border-left: 4px solid #dc3545;
        padding: 1.25rem;
        border-radius: 6px;
        text-align: left;
    }

    .error-info p {
        font-size: 0.95rem;
        color: #495057;
        margin: 0.5rem 0;
        line-height: 1.5;
    }

    @media (max-width: 640px) {
        .error-message {
            font-size: 0.95rem;
        }
    }
</style>
</body>
</html>
