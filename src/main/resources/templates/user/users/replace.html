<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="userShare" type="org.esupportail.esupsignature.entity.UserShare"*/-->
<!--/*@thymesVar id="forms" type="java.util.List<org.esupportail.esupsignature.entity.Form>"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<script type="module" th:src="'/js/modules/bootstrap/ShareBootstrap.js?version=' + ${versionApp}"></script>
<script type="module" th:src="'/js/modules/bootstrap/UserReplaceBootstrap.js?version=' + ${versionApp}"></script>
<body class="user-settings-page user-replace-page">
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <button type="button" th:unless="${user.userType.name() == 'external'}" class="user-settings-sidebar-toggle btn btn-sm btn-light d-xl-none ms-2" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar" aria-label="Ouvrir le menu des paramètres">
                <i class="fi fi-rr-sidebar"></i>
            </button>
            <ol id="breadcrumb-ol" class="breadcrumb">
                <li class="breadcrumb-item"><i class="fi fi-rr-user"></i> <span th:text="${authUser.firstname} + ' ' + ${authUser.name}"></span></li>
                <li class="breadcrumb-item es-breadcrumb-title active">Remplacements</li>
            </ol>
            <button th:if="${user.replaceByUser == null}" type="button" title="Mettre en place une redirection" aria-label="Mettre en place une redirection" data-bs-toggle="modal" data-bs-target="#newReplaceModal" class="btn btn-sm btn-light d-xl-none ms-auto me-2">
                <i class="fi fi-rr-plus"></i>
            </button>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content es-main-content-user-settings d-flex">
                <div class="es-sidebar d-flex">
                    <nav th:replace="~{fragments/sides/side-user :: side-user}"></nav>
                </div>
                <div class="flex-grow-1 user-replace-panel">
                    <div class="m-2">
                        <div class="alert border-secondary-subtle" th:if="${user.replaceByUser != null}">
                            Vos demandes seront redirigées vers <b th:text="${user.replaceByUser.name + ' ' + user.replaceByUser.firstname}"></b>
                            <span th:if="${user.replaceBeginDate != null}"> du <b th:text="${#dates.format(user.replaceBeginDate, 'dd/MM/yyyy HH:mm')}"></b> au <b th:text="${#dates.format(user.replaceEndDate, 'dd/MM/yyyy HH:mm')}"></b></span>
                            <div th:if="${signRequests.size() > 0 && user.currentReplaceByUser != null}" class="m-2">
                                <a class="btn btn-primary js-confirm-transfer" data-confirm-message="Merci de confirmer le transfert de toutes vos demandes. Les demandes ne pourront plus être récupérées"
                                    href="/user/users/replace/transfer">Transférer toutes mes demandes en cours</a>
                            </div>
                            <form th:action="'/user/users/replace/update'" method="post" class="m-2">
                                <input type="submit" class="btn btn-danger" value="Supprimer la redirection">
                            </form>
                        </div>
                        <div class="alert alert-secondary" th:unless="${user.replaceByUser != null}">
                            Aucun remplacement n’est mise en place actuellement
                        </div>
                    </div>
                </div>
                <div class="es-sign-buttons es-fixed-action-btns active">
                    <ul class="list-unstyled">
                        <li>
                            <a th:if="${user.replaceByUser == null}" title="Mettre en place une redirection" data-bs-toggle="modal" data-bs-target="#newReplaceModal" type="button"
                                class="btn btn-transparent text-dark">
                                <i class="fi fi-rr-plus"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <div data-bs-focus="false" class="modal fade" id="newReplaceModal"  role="dialog"
         aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Mettre en place une redirection pour les demandes qui me sont adressées</h5>
                    <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="replaceModalForm" th:action="'/user/users/replace/update'" method="post">
                    <div class="modal-body">
                        <div class="form-group mb-3">
                            <label for="selectUsers">Choix du destinataire</label>
                            <select id="selectUsers" class="auto-select-users" name="userIds"
                                    required="required"></select>
                        </div>
                        <div class="form-group mb-3">
                            <label for="beginDate">Date de début</label>
                            <input type="datetime-local" id="beginDate" name="beginDate" class="form-control">
                        </div>
                        <div class="form-group mb-3">
                            <label for="endDate">Date de fin</label>
                            <input type="datetime-local" id="endDate" name="endDate" class="form-control">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Annuler</button>
                        <input type="submit" class="btn btn-success" value="Valider">
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
