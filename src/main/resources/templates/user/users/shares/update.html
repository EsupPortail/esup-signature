<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="userShare" type="org.esupportail.esupsignature.dto.page.user.share.UserShareViewDto"*/-->
<!--/*@thymesVar id="forms" type="java.util.List<org.esupportail.esupsignature.entity.Form>"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<script th:inline="javascript" type="module">
    import {default as ShareUi} from '/js/modules/ui/users/ShareUi.js?version=@[(${versionApp})]@';
    new ShareUi();
</script>
<body class="user-settings-page">
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <button type="button" th:unless="${user.userType.name() == 'external'}" class="user-settings-sidebar-toggle btn btn-sm btn-light d-xl-none ms-2" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar" aria-label="Ouvrir le menu des paramètres">
                <i class="fi fi-rr-sidebar"></i>
            </button>
            <ol id="breadcrumb-ol" class="breadcrumb">
                <li class="breadcrumb-item"><a href="/user/users/shares">Délégations</a></li>
                <li class="breadcrumb-item es-breadcrumb-title active" th:if="${userShare.workflow}"
                    th:text="${userShare.workflow.description}"></li>
                <li class="breadcrumb-item es-breadcrumb-title active" th:if="${userShare.form}" th:text="${userShare.form.title}"></li>
                <li class="breadcrumb-item es-breadcrumb-title active" th:if="${userShare.workflow}" th:text="${userShare.workflow.title}"></li>
                <li class="breadcrumb-item es-breadcrumb-title active" th:if="${userShare.allSignRequests}">Toutes les demandes</li>
            </ol>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content es-main-content-user-settings d-flex">
                <div class="es-sidebar d-flex">
                    <nav th:replace="~{fragments/sides/side-user :: side-user}"></nav>
                </div>
                <div class="flex-grow-1 overflow-scroll">
                    <div class="m-2">
                        <div class="alert border-secondary-subtle col-lg-12">
                            <h5>Modifier la délégation sur :
                                <span th:if="${userShare.form}" th:text="${userShare.form.title}"></span>
                                <span th:if="${userShare.workflow}" th:text="${userShare.workflow.title}"></span>
                                <span th:if="${userShare.allSignRequests}">Toutes les demandes</span>
                            </h5>
                            <form id="shareForm" th:action="'/user/users/shares/update/' + ${userShare.id}" method="post">
                                <div id="selectFormDiv" class="form-group mb-3" th:if="${userShare.form}">
                                    <h5>
                                        <label class="form-label">Formulaires délégué : </label>
                                        <span th:text="${userShare.form.title}"></span>
                                    </h5>
                                </div>

                                <div id="selectWorkflowDiv" class="form-group mb-3" th:if="${userShare.workflow}">
                                    <label class="form-label">Circuits délégué : </label>
                                    <span th:text="${userShare.workflow.description}"></span>
                                </div>

                                <div class="form-group mb-3">
                                    <label class="form-label">Type de délégation</label>
                                    <th:block th:each="shareType : ${T(org.esupportail.esupsignature.entity.enums.ShareType).values()}">
                                        <div class="form-check text-left">
                                            <input th:id="'check-' + ${shareType.name()}" type="checkbox" class="form-check-input" name="types"
                                                   th:checked="${userShare.shareTypes.contains(shareType)}"
                                                   th:value="${shareType.name()}"
                                                   th:disabled="${(userShare.form != null && !userShare.form.authorizedShareTypes.contains(shareType)) || (userShare.workflow != null && !userShare.workflow.authorizedShareTypes.contains(shareType))}"/>
                                            <label class="form-check-label" th:for="'check-' + ${shareType.name()}"
                                                   th:text="#{'usershare.sharetype.' + ${shareType.name()}}"></label>
                                        </div>
                                    </th:block>
                                </div>
                                <div class="form-group mb-3">
                                    <div class="form-check form-switch form-switch-md">
                                        <input id="forceTransmitEmails" type="checkbox" class="form-check-input" name="forceTransmitEmails"
                                               th:checked="${userShare.forceTransmitEmails}"/>
                                        <label class="form-check-label">Forcer l’envoi de mail au délégué</label>
                                    </div>
                                </div>
                                <div id="sign-mod" class="form-group d-none mb-3" th:if="${globalProperties.shareMode > 2}">
                                    <label class="form-label" for="signWithOwnSign">Modalité de signature</label>
                                    <select id="signWithOwnSign" class="form-select" name="signWithOwnSign">
                                        <option value="" data-placeholder="true">Choisir un type</option>
                                        <option value="true" th:selected="${userShare.signWithOwnSign}">Le délégué signe avec sa propre signature</option>
                                        <option value="false" th:selected="${!userShare.signWithOwnSign}">Le délégué signe avec votre signature</option>
                                    </select>
                                </div>

                                <div class="form-group mb-3">
                                    <label class="form-label" for="selectUsers">Choix des utilisateurs</label>
                                    <select id="selectUsers" class="auto-select-users" name="userIds" multiple="multiple" required="required">
                                        <option data-placeholder="true"></option>
                                        <th:block th:each="user : ${userShare.toUsers}">
                                            <option th:value="${user.email}"
                                                    th:placeholder="${user.email}"
                                                    th:text="${user.email}" selected></option>
                                        </th:block>
                                    </select>
                                </div>
                                <div class="form-group mb-3">
                                    <label class="form-label" for="beginDate">Date de début</label>
                                    <input id="beginDate" type="datetime-local" name="beginDate" class="form-control datepicker" th:value="${#dates.format(userShare.beginDate, 'yyyy-MM-dd''T''HH:mm')}">
                                </div>
                                <div class="form-group mb-3">
                                    <label class="form-label" for="endDate">Date de fin</label>
                                    <input id="endDate" type="datetime-local" name="endDate" class="form-control datepicker" th:value="${#dates.format(userShare.endDate, 'yyyy-MM-dd''T''HH:mm')}">
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="es-sign-buttons es-fixed-action-btns active">
                    <ul class="list-unstyled">
                        <li>
                            <button id="saveButton" role="button" title="Enregistrer" class="btn btn-transparent text-dark" onclick="document.getElementById('shareForm').submit();">
                                <i class="fi fi-rr-disk"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
