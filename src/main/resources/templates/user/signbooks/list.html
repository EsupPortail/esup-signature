<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sd="http://www.w3.org/1999/xhtml" lang="fr">
<!--/*@thymesVar id="signBookLight" type="org.esupportail.esupsignature.entity.SignBook"*/-->
<!--/*@thymesVar id="signRequest" type="org.esupportail.esupsignature.entity.SignRequest"*/-->
<!--/*@thymesVar id="signRequests" type="org.springframework.data.domain.Page<esupportail.esupsignature.entity.SignRequest>"*/-->
<!--/*@thymesVar id="statusFilter" type="org.esupportail.esupsignature.entity.enums.SignRequestStatus"*/-->
<!--/*@thymesVar id="infiniteScrolling" type="java.lang.Boolean"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<script th:inline="javascript">
    (() => {
        const storageKey = 'esup-user-signbooks-display-mode';
        let storedMode = null;

        try {
            storedMode = window.localStorage.getItem(storageKey);
        } catch (e) {
            console.debug('LocalStorage indisponible pour la préférence d’affichage des signbooks', e);
        }

        const hasStoredPreference = storedMode === 'infinite' || storedMode === 'pagination';
        if (!hasStoredPreference) {
            return;
        }

        const resolvedInfiniteScrolling = storedMode === 'infinite';
        const params = new URLSearchParams(window.location.search);
        const currentInfiniteScrolling = params.get('infiniteScrolling');

        if (currentInfiniteScrolling === String(resolvedInfiniteScrolling)) {
            return;
        }

        params.set('infiniteScrolling', String(resolvedInfiniteScrolling));
        params.delete('page');
        const queryString = params.toString();
        window.location.replace(window.location.pathname + (queryString !== '' ? '?' + queryString : ''));
    })();
</script>
<script th:inline="javascript" type="module">
    import {ListSignBooksUi} from '/js/modules/ui/signbooks/ListSignBooksUi.js?version=@[(${versionApp})]@';
    new ListSignBooksUi([[${signBooks}]], [[${statusFilter}]], [[${recipientsFilter}]], [[${workflowFilter}]], [[${creatorFilter}]], [[${docTitleFilter}]], [[${dateFilter}]], [[${infiniteScrolling}]], [[${_csrf}]], "user", {
        preferenceStorageKey: 'esup-user-signbooks-display-mode',
        toggleSelector: '#signbooksDisplayModeSwitch'
    });
</script>
<body class="signbooks-list-page signbooks-list-loading">
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main" th:style="${infiniteScrolling} ? '' : 'padding-bottom: 0px;'">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 w-100">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item text-uppercase d-flex align-items-center active"><i class="fi fi-rr-ballot"></i> Tableau de bord</li>
                </ol>
                <div class="btn-group me-2 ms-auto" role="group" aria-label="Mode d'affichage">
                    <input type="checkbox"
                            class="btn-check"
                            id="signbooksDisplayModeSwitch"
                            th:checked="${infiniteScrolling}"
                            autocomplete="off">
                    <label class="btn btn-sm text-uppercase d-flex align-items-center gap-2"
                            for="signbooksDisplayModeSwitch"
                            title="Basculer entre pagination et défilement infini">
                        <i class="fi fi-rr-mouse-scroll"></i>
                    </label>
                </div>
            </div>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content d-flex">
                <nav th:replace="~{fragments/sides/side-dashboard :: side-dashboard}"></nav>
                <div class="flex-grow-1">
                    <div tabindex="0" id="listSignRequestTable" class="table-fix-head scrollbar-style rounded-3 p-0 m-2 signbooks-table-loading-shell" style="outline: none;">
                        <div id="loader" class="loader" style="position: fixed; left: 50%; top: 40%; z-index:100000000; display: none;"></div>
                        <table class="table table-borderless table-hover table-light">
                            <thead class="table-secondary signbooks-thead-loading-shell">
                            <tr class="signbooks-thead-loading-row" style="z-index: 2;">
                                <th class="d-none d-lg-table-cell" style="width: 20px; z-index: 3;">
                                    <div class="dropdown position-relative">
                                        <button type="button" id="menu-toggle_multiple" class="btn" data-bs-target="#menu-multiple" aria-controls="menu-multiple" data-bs-toggle="dropdown">
                                            <i class="fi fi-rr-menu-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu position-absolute ps-2 pe-2 mt-2" id="menu-multiple">
                                            <li>
                                                <button id="selectAllButton" class="btn btn-transparent text-dark text-left col-12" title="Consulter" role="button">
                                                    <i class="fi fi-rr-angle-square-down"></i> Tout sélectionner
                                                </button>
                                            </li>
                                            <li>
                                                <button id="unSelectAllButton" class="btn btn-transparent text-dark text-left col-12" title="Consulter" role="button">
                                                    <i class="fi fi-rr-square-minus"></i> Tout dé-sélectionner
                                                </button>
                                            </li>
                                            <li>
                                                <button id="menuDeleteMultipleButton" class="btn btn-transparent text-dark text-left col-12 d-none"><i class="fi fi-rr-trash"></i> Supprimer la sélection</button>
                                            </li>
                                            <li>
                                                <button id="menuRestoreMultipleButton" class="btn btn-transparent text-primary text-left col-12 d-none"><i class="fi fi-rr-trash-restore"></i> Restaurer la sélection</button>
                                            </li>
                                            <li>
                                                <button id="menuDownloadMultipleButton" class="btn btn-transparent text-dark text-left col-12 d-none"><i class="fi fi-rr-download"></i> Télécharger la sélection</button>
                                            </li>
                                            <li>
                                                <button id="menuDownloadMultipleButtonWithReport" class="btn btn-transparent text-dark text-left col-12 d-none"><i class="fi fi-rr-download"></i> Télécharger la sélection avec rapports</button>
                                            </li>
                                        </ul>
                                    </div>
                                </th>
                                <th class="d-none d-lg-table-cell" style="width: 60px;"></th>
                                <th class="text-center">
                                    <select es-search-text="Titre du document" es-search-url="/user/signbooks/search-doc-titles" id="docTitleFilter" class="slim-select-filter-search sign-request-filter" data-placeholder="Titre des documents" data-allow-deselect="true">
                                        <option data-placeholder="true"></option>
                                        <option value="all">Tout</option>
                                    </select>
                                </th>
                                <th th:each="groupName : ${tagGroups}" class="d-none d-xl-table-cell text-center" style="min-width: 90px;"
                                    th:style="'min-width: 90px; border-bottom: 3px solid ' + ${tagGroupColors != null && tagGroupColors.containsKey(groupName) ? tagGroupColors.get(groupName) : '#6c757d'} + ';'"
                                    th:text="${groupName}"></th>
                                <th class="d-none d-xxl-table-cell text-center">
                                    <select id="workflowFilter" class="slim-select-filter sign-request-filter" data-es-check-cert="false" data-placeholder="Circuit" data-allow-deselect="true" multiple>
                                        <option data-placeholder="true"></option>
                                        <option value="all">Tout</option>
                                        <th:block th:each="workflow : ${workflowNames}">
                                            <option th:value="${workflow}" th:selected="${workflowFilter == workflow}" th:text="${workflow}"></option>
                                        </th:block>
                                    </select>
                                </th>
                                <th class="d-none d-xxxxl-table-cell" style="width: 150px;">
                                    <div class="d-flex text-center">
                                        <select id="creatorFilter" class="slim-select-filter sign-request-filter" data-es-check-cert="false" data-placeholder="Créateur" data-allow-deselect="true" multiple>
                                            <option data-placeholder="true"></option>
                                            <option value="all">Tout</option>
                                            <th:block th:each="creator : ${creators}">
                                                <option th:value="${creator.eppn}" th:selected="${creatorFilter == creator.eppn}" th:text="${creator.firstname} + ' ' + ${creator.name}"></option>
                                            </th:block>
                                        </select>
                                        <th:block th:with="order=${signBooks.sort.getOrderFor('createBy')}">
                                            <a sd:pagination-sort="createBy" class="sorted my-auto text-center ms-1" th:classappend="${order == null ? 'text-dark' : 'text-primary'}" style="text-decoration: none;">
                                                <i th:if="${order != null && order.direction.name() == 'ASC'}" class="fi fi-rr-sort-amount-down"></i>
                                                <i th:if="${order != null && order.direction.name() == 'DESC'}" class="fi fi-rr-sort-amount-up"></i>
                                                <i th:if="${order == null}" class="fi fi-rr-sort-alt"></i>
                                            </a>
                                        </th:block>
                                    </div>
                                </th>
                                <th class="d-none d-sm-table-cell" style="width: 150px;">
                                    <div class="d-flex text-center">
                                        <input type="date" id="dateFilter" name="dateFilter" placeholder="Date de création" title="Date de création" class="form-control date sign-request-filter" th:value="${dateFilter}">
                                        <th:block th:with="order=${signBooks.sort.getOrderFor('createDate')}">
                                            <a sd:pagination-sort="createDate" class="sorted my-auto text-center ms-1" th:classappend="${order == null ? 'text-dark' : 'text-primary'}" style="text-decoration: none;">
                                                <i th:if="${order != null && order.direction.name() == 'ASC'}" class="fi fi-rr-sort-amount-down"></i>
                                                <i th:if="${order != null && order.direction.name() == 'DESC'}" class="fi fi-rr-sort-amount-up"></i>
                                                <i th:if="${order == null}" class="fi fi-rr-sort-alt"></i>
                                            </a>
                                        </th:block>
                                    </div>
                                </th>
                                <th class="d-none d-xxxl-table-cell" style="width: 150px">
                                    <select id="recipientsFilter" class="auto-select-users sign-request-filter" data-es-check-cert="false" data-placeholder="Participants" data-allow-deselect="true">
                                        <option data-placeholder="true"></option>
                                        <option value="all">Tout</option>
                                    </select>
                                </th>
                                <th class="d-none d-xxxl-table-cell" style="min-width:138px">
                                    <th:block th:with="order=${signBooks.sort.getOrderFor('endDate')}">
                                        <a sd:pagination-sort="endDate" class="sorted" th:classappend="${order == null ? 'text-dark' : 'text-primary'}" style="text-decoration: none;">
                                            Terminé le 
                                            <i th:if="${order != null && order.direction.name() == 'ASC'}" class="fi fi-rr-sort-amount-down"></i>
                                            <i th:if="${order != null && order.direction.name() == 'DESC'}" class="fi fi-rr-sort-amount-up"></i>
                                            <i th:if="${order == null}" class="fi fi-rr-sort-alt"></i>
                                        </a>
                                    </th:block>
                                </th>
                                <th class="text-center" style="width: 150px;">
                                    <th:block th:with="order=${signBooks.sort.getOrderFor('status')}">
                                        <a sd:pagination-sort="status" class="sorted" th:classappend="${order == null ? 'text-dark' : 'text-primary'}" style="text-decoration: none;">
                                            Statut 
                                            <i th:if="${order != null && order.direction.name() == 'ASC'}" class="fi fi-rr-sort-amount-down"></i>
                                            <i th:if="${order != null && order.direction.name() == 'DESC'}" class="fi fi-rr-sort-amount-up"></i>
                                            <i th:if="${order == null}" class="fi fi-rr-sort-alt"></i>
                                        </a>
                                    </th:block>
                                </th>
                                <th class="d-none d-xxl-table-cell">
                                    <a class="sorted" sd:pagination-sort="archiveStatus"></a>
                                </th>
                                <th >Actions</th>
                            </tr>
                            </thead>
                            <tbody id="signRequestTable">
                                <tr th:replace="~{user/signbooks/includes/list-elem}"></tr>
                            </tbody>
                            <tfoot>
                            <tr th:if="${infiniteScrolling}">
                                <td colspan="100%">
                                    <button type="button" id="more-sign-request" class="btn btn-transparent text-dark">Afficher plus</button>
                                </td>
                            </tr>
                            <tr th:unless="${infiniteScrolling}">
                                <td th:replace="~{fragments/pagination :: pagination}"></td>
                            </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
                <div id="signButtons" class="es-sign-buttons d-flex flex-column justify-content-between bg-white es-fixed-action-btns active active" style="width: 72px;">
                    <ul id="buttonList" class="list-unstyled">
                        <li>
                            <a type="button" id="massSignModalButton"
                               data-bs-toggle="modal" data-bs-target="#signModal"
                               title="Signer en masse les demandes sélectionnées"
                               class="btn btn-transparent text-success d-none">
                                <i class="fi fi-rr-signature-lock" ></i>
                            </a>
                        </li>
                        <li>
                            <a type="button" id="downloadMultipleButton"
                               title="Télécharger la selection"
                               class="btn btn-transparent text-dark d-none">
                                <i class="fi fi-rr-download" ></i>
                            </a>
                        </li>
                        <li>
                            <a type="button" id="downloadMultipleButtonWithReport"
                               title="Télécharger la selection avec les rapports"
                               class="btn btn-transparent text-dark d-none">
                                <i class="fi fi-rr-folder-download " ></i>
                            </a>
                        </li>
                        <li>
                            <a type="button" id="restoreMultipleButton"
                               title="Restaurer en masse les demandes sélectionnées"
                               class="btn btn-transparent text-primary d-none">
                                <i class="fi fi-rr-trash-restore"></i>
                            </a>
                        </li>
                        <li>
                            <a type="button" id="deleteMultipleButton"
                               title="Supprimer en masse les demandes sélectionnées"
                               class="btn btn-transparent text-danger d-none">
                                <i class="fi fi-rr-trash" ></i>
                            </a>
                        </li>
                        <li th:if="${statusFilter == 'deleted'}">
                            <form th:action="'/user/signbooks/empty-trash'" th:method="'delete'"
                                  onsubmit="return confirm('Voulez-vous vraiment vider la corbeille ?');">
                                <button type="submit" tabindex="1" id="trashLaunchButton" class="btn btn-transparent text-danger"
                                        title="Vider la corbeille" style="border: 0;">
                                    <i class="fi fi-rr-dumpster-fire" style="margin-top: 0;"></i>
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/sign-validation-modal :: sign-modal(
    signable=${signable},
    currentSignType=${currentSignType},
    signRequest=${null},
    signRequests=${signRequests},
    signWiths=${signWiths},
    sealCertOK=${sealCertOK},
    sealCertificatPropertieses=${sealCertificatPropertieses},
    currentStepMinSignLevel=${null},
    signatureIds=${null},
    stepRepeatable=${false},
    signBook=${null},
    currentStepRepeatableSignType=${null},
    signTypes=${signTypes},
    liveWorkflowStepCount=${null},
    currentStepNumber=${null},
    steps=${null},
    nextSignRequestId=${null},
    urlProfil=${'user'}
)}"></div>
<div id="wait" data-bs-focus="false" class="modal fade"  role="dialog" data-keyboard="false" data-backdrop="static">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-body text-center">
                <h5>Signature en cours</h5>
                <div id="signSpinner" class="justify-content-center">
                    <div class="spinner-border" role="status" style="width: 3rem; height: 3rem;">
                        <span class="sr-only">En cours...</span>
                    </div>
                </div>
                <span id="bar-text"></span>
                <div id="signError" class="alert alert-danger mt-2 text-break" role="alert">
                    Erreur du système de signature
                </div>
            </div>
            <div class="modal-footer">
                <button id="closeModal" type="button" class="btn btn-secondary align-self-center" data-bs-dismiss="modal" onclick="location.reload();">
                    Fermer
                </button>
                <button id="validModal" onclick="location.href = '/user/reports';" class="btn btn-secondary">Voir le rapport complet</button>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
