<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="signBookLight" type="org.esupportail.esupsignature.dto.page.user.signbook.SignBookLightDto"*/-->
<div th:fragment="status(signBookLight)" th:with="statusValue=${signBookLight.status != null ? signBookLight.status.toString() : null}">
    <div th:if="${!signBookLight.deleted}" th:switch="${statusValue}" class="text-center mb-1 mt-1">
        <div th:case="'uploading'" class="badge rounded-pill badge-status bg-secondary-subtle" th:title="#{'signbook.status.' + ${statusValue}}">
            <i class="fi fi-rr-cloud-upload-alt" th:title="#{'signbook.status.' + ${statusValue}}"></i>
            <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${statusValue}}"></span>
        </div>
        <div th:case="'refused'" class="badge rounded-pill badge-status text-danger-emphasis"
            style="background-color: var(--bs-danger-border-subtle);"
            th:title="${refusedCommentTitle != null ? refusedCommentTitle : (comments != null && comments.size() > 0 ? comments.get(comments.size() - 1).text : '')}">
            <i class="fi fi-rr-cross-circle"></i>
            <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${statusValue}}"></span>
        </div>
        <div th:case="*">
            <div class="badge rounded-pill badge-status" th:classappend="'text-' + #{'signbook.status.color.' + ${statusValue}} + '-emphasis'" th:style="'background-color: var(--bs-' + #{'signbook.status.color.' + ${statusValue}} + '-border-subtle);'" th:title="#{'signbook.status.' + ${statusValue}}">
                <i class="fi" th:classappend="#{'signbook.status.icon.' + ${statusValue}}" th:title="#{'signbook.status.' + ${statusValue}}"></i>
                <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${statusValue}}"></span>
            </div>
        </div>
    </div>
    <div th:if="${signBookLight.deleted}" class="text-center mb-1 mt-1">
        <div class="badge rounded-pill badge-status bg-danger" th:title="'Avant suppression : ' + #{'signbook.status.' + ${statusValue}}">
            <i class="fi fi-rr-trash"></i>
            <span class="d-md-inline-flex">Supprimé</span>
        </div>
    </div>
</div>
</html>
