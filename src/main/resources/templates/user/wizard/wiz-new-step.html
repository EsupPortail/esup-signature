<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<div class="modal-header">
    <h3 class="modal-title">Assistant de création de circuit</h3>
    <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
    <div id="stepper1" class="steps-horizontal-v2 d-flex justify-content-center" style="width: 100%;">
        <div id="wiz-step-1" class="step-horizontal-v2 d-flex gap-2 align-items-center complete">
            <div class="d-flex align-items-center gap-2">
                <div class="step-horizontal-v2-icon"><i class="fi fi-rr-cloud-upload-alt"></i></div>
            </div>
            <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Dépôt des fichiers</span></div>
        </div>
        <div id="wiz-step-2" class="step-horizontal-v2 d-flex gap-2 align-items-center active">
            <div class="d-flex align-items-center gap-2">
                <div class="step-horizontal-v2-icon"><i class="fi fi-rr-diagram-project"></i></div>
            </div>
            <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Création du circuit</span></div>
        </div>
        <div id="wiz-step-3" class="step-horizontal-v2 d-flex gap-2 align-items-center disabled">
            <div class="d-flex align-items-center gap-2">
                <div class="step-horizontal-v2-icon"><i class="fi fi-rr-disk"></i></div>
            </div>
            <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Sauvegarde</span></div>
        </div>
        <div id="wiz-step-4" class="step-horizontal-v2 d-flex gap-2 align-items-center disabled">
            <div class="d-flex align-items-center gap-2">
                <div class="step-horizontal-v2-icon"><i class="fi fi-rr-flag"></i></div>
            </div>
            <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Fin</span></div>
        </div>
    </div>
    <hr>
    <div id="stepper2" class="wizard-steps-preview wizard-steps-preview--horizontal">
        <th:block th:if="${signBook.liveWorkflow.liveWorkflowSteps.size() > 0}" th:each="liveWorkflowStep, iterator : ${signBook.liveWorkflow.liveWorkflowSteps}">
            <div th:id="'liveStep-' + ${iterator.index + 1}" class="step-vertical configured" th:name="'step_' + ${iterator.index}">
                <div class="wizard-step-actions">
                    <div class="step-vertical-icon" title="Étape configurée">
                        <span th:text="${iterator.index + 1}"></span>
                    </div>
                    <button type="button"
                            th:id="'delete-step-' + ${liveWorkflowStep.id}"
                            th:data-es-step-id="${liveWorkflowStep.id}"
                            class="btn btn-transparent text-danger btn-sm wizard-step-delete-btn"
                            title="Supprimer cette étape">
                        <i class="fi fi-rr-trash"></i>
                    </button>
                </div>
                <div class="step-vertical-content bg-white rounded">
                    <div class="wizard-step-card-header">
                        <div class="wizard-step-card-body">
                            <div th:if="${liveWorkflowStep.workflowStep != null && liveWorkflowStep.workflowStep.description != null && liveWorkflowStep.workflowStep.description != ''}" class="mb-1">
                                <span th:text="${liveWorkflowStep.workflowStep.description}"></span>
                            </div>
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <span class="step-type" th:text="#{'signbook.signtype.' + ${liveWorkflowStep.signType}}"></span>
                                <span th:replace="~{user/signrequests/cards/levelcard :: levelcard}"></span>
                            </div>
                        </div>
                        <div class="wizard-step-card-indicators">
                            <span title="Tous les participants doivent signer" th:if="${liveWorkflowStep.allSignToComplete}"><i class="fi fi-rr-users-alt"></i></span>
                            <span title="Une signature suffit" th:unless="${liveWorkflowStep.allSignToComplete}" class="text-muted"><i class="fi fi-rr-users-slash"></i></span>
                            <span title="Étape infinie" th:if="${liveWorkflowStep.repeatable}" class="text-dark"><i class="fi fi-rr-infinite-cycle"></i></span>
                        </div>
                    </div>
                    <table class="table table-sm table-hover table-borderless wizard-step-card-table">
                        <th:block th:each="recipient : ${liveWorkflowStep.recipients}">
                            <tr>
                                <td th:title="${recipient.user.email}" th:text="${recipient.user.firstname + ' ' + recipient.user.name}"></td>
                            </tr>
                        </th:block>
                    </table>
                </div>
            </div>
        </th:block>
    </div>
    <hr>
    <h4 class="d-flex justify-content-center mt-4">Paramètres de l’étape&nbsp;<span th:text="${signBook.liveWorkflow.liveWorkflowSteps.size() + 1}"></span></h4>
    <form id="wiz-step-form">
        <input type="submit" id="wiz-step-form-submit" class="d-none">
        <div class="col-12">
            <div th:if="${signBook.liveWorkflow.liveWorkflowSteps.size() == 0}" class="form-group form-switch form-switch-md mb-3">
                <input type="checkbox" class="form-check-input" name="userSignFirst" id="userSignFirst" autofocus>
                <label for="userSignFirst" class="form-check-label">
                    Je dois signer ce document avant l’envoi
                </label>
            </div>
            <label class="form-label" for="recipientsEmails-1">Choisir les participants *</label>
            <select class="select-users" data-es-check-cert="true" name="recipientsEmails" id="recipientsEmails-1" multiple="multiple" required="required">
                <option data-placeholder="true"></option>
            </select>
            <script>
                document.querySelector('#recipientsEmails-1').addEventListener('change', () => {
                    if (!document.getElementById('end-workflow-sign') || !document.getElementById('end-workflow-sign-start')) return;
                    let hasSelection = document.querySelector('#recipientsEmails-1').selectedOptions.length > 0;
                    document.getElementById('end-workflow-sign').disabled = hasSelection;
                    document.getElementById('end-workflow-sign-start').disabled = hasSelection;
                });
            </script>
            <div id="tempUsers-recipientsEmails-1"></div>
            <br/>
            <div class="form-check form-switch form-switch-md mb-2" id="all-sign-to-complete-div-1" style="display: none">
                <label class="form-check-label" for="all-sign-to-complete-1">
                    Tous les participants doivent signer pour valider l'étape
                </label>
                <input type="checkbox" class="form-check-input" id="all-sign-to-complete-1" name="allSignToComplete"/>
            </div>
            <div class="d-flex flex-column gap-2 mb-2">
                <div class="form-group w-100">
                    <label class="form-label" for="signType-1">Choisir un type de signature *</label>
                    <select class="form-select" name="signType" id="signType-1" onchange="toggleSignLevel()">
                        <th:block th:each="signType : ${signTypes}">
                            <option th:value="${signType}"
                                    th:text="#{'signbook.signtype.' + ${signType}}"></option>
                        </th:block>
                    </select>
                </div>
                <div class="form-group w-10" id="minSignLevel" title="Avancée et qualifiée nécessitent un certificat">
                    <label class="form-label">Niveaux de signature autorisés :</label>
                    <div class="d-flex gap-5">
                        <div>
                            <small>Niveau minimum</small>
                            <select class="form-select" name="minSignLevel" id="minSignLevel-1">
                                <th:block th:each="signLevel : ${signLevels}">
                                    <option th:value="${signLevel}" th:text="#{'signlevel.' + ${signLevel}}"></option>
                                </th:block>
                            </select>
                        </div>
                        <div>
                            <small>Niveau maximum</small>
                            <select class="form-select" name="maxSignLevel" id="maxSignLevel-1">
                                <th:block th:each="signLevel : ${signLevels}">
                                    <option th:value="${signLevel}" th:text="#{'signlevel.' + ${signLevel}}" th:selected="${signLevel == T(org.esupportail.esupsignature.entity.enums.SignLevel).qualified}"></option>
                                </th:block>
                            </select>
                        </div>
                    </div>
                </div>
                <div th:if="${#authorization.expression('hasRole(''ROLE_SEAL'')')}" class="form-check form-switch form-switch-md mt-5" id="seal-options" style="display: none;">
                    <label class="form-check-label">
                        Utiliser le cachet de l’établissement pour verrouiller le visa
                    </label>
                    <input type="checkbox" class="form-check-input" id="sealVisa-1"/>
                </div>
            </div>
            <div class="form-check form-switch form-switch-md ">
                <label class="form-check-label">
                    Les signataires peuvent apposer plusieurs signatures
                </label>
                <input type="checkbox" class="form-check-input" id="multiSign-1" checked/>
            </div>
            <div class="form-check form-switch form-switch-md">
                <label class="form-check-label">
                    Si signature unique, autoriser les annotations (coches, croix...)
                </label>
                <input type="checkbox" class="form-check-input" checked id="singleSignWithAnnotation-1" disabled/>
            </div>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
    <button type="button" id="save-step" value="true" class="btn btn-primary float-end m-1">
        <i class="fi fi-rr-plus"></i> Enregistrer cette étape
    </button>
    <button formnovalidate id="end-workflow-sign" name="end-workflow-sign" value="true" th:if="${signBook.liveWorkflow.liveWorkflowSteps.size() > 0}" type="button" class="btn btn-success float-end m-1">
        <i class="fi fi-rr-disk"></i> Terminer et annoter
    </button>
    <button formnovalidate id="end-workflow-sign-start" name="end-workflow-sign" value="true" th:if="${signBook.liveWorkflow.liveWorkflowSteps.size() > 0}" type="button" class="btn btn-success float-end m-1">
        <i class="fi fi-rr-paper-plane"></i> Terminer et envoyer
    </button>
</div>
</html>
