<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<div class="modal-header">
    <h4 class="d-flex justify-content-center mt-4">Création de la demande personnalisée terminée</h4>
    <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
<div class="steps-horizontal-v2 d-flex justify-content-center" style="width: 100%;">
    <div id="wiz-step-1" class="step-horizontal-v2 d-flex gap-2 align-items-center complete">
        <div class="d-flex align-items-center gap-2">
            <div class="step-horizontal-v2-icon"><i class="fi fi-rr-cloud-upload-alt"></i></div>
        </div>
        <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Dépôt des fichiers</span></div>
    </div>
    <div id="wiz-step-2" class="step-horizontal-v2 d-flex gap-2 align-items-center complete">
        <div class="d-flex align-items-center gap-2">
            <div class="step-horizontal-v2-icon"><i class="fi fi-rr-diagram-project"></i></div>
        </div>
        <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Création du circuit</span></div>
    </div>
    <div id="wiz-step-3" class="step-horizontal-v2 d-flex gap-2 align-items-center active">
        <div class="d-flex align-items-center gap-2">
            <div class="step-horizontal-v2-icon"><i class="fi fi-rr-disk"></i></div>
        </div>
        <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Sauvegarde</span></div>
    </div>
    <div id="wiz-step-4" class="step-horizontal-v2 d-flex gap-2 align-items-center disabled">
        <div class="d-flex align-items-center gap-2">
            <div class="step-horizontal-v2-icon"><i class="fi fi-rr-flag"></i></div>
        </div>
        <div class="step-horizontal-v2-content"><span class="text-xs font-bold">Fin</span></div>
    </div>
</div>
<form id="saveWorkflowForm">
    <input type="hidden" id="close" th:value="${close}" />
    <div class="row">
        <div class="col-lg-12">
            <label for="workflowName"><strong>Choisir un nom pour sauvegarder le circuit en tant que modèle</strong></label>
            <input type="submit" id="save-workflow-submit" class="d-none">
            <input type="hidden" id="elementId" th:value="${signBook.id}">
            <input type="text" id="workflowName" name="name" class="form-control required" required autofocus>
        </div>
    </div>
</form>
</div>
<div class="modal-footer">
    <button id="wiz-exit" type="button" class="btn btn-secondary float-start">
        <i class="fi fi-rr-door-open"></i> Fermer sans enregistrer
    </button>
    <button id="save-workflow" type="button" class="btn btn-success float-end">
        <i class="fi fi-rr-disk"></i> Enregistrer le circuit
    </button>
</div>
</html>
