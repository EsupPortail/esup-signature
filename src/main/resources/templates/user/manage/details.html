<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sd="http://www.w3.org/1999/xhtml">
<!--/*@thymesVar id="signBookLight" type="org.esupportail.esupsignature.dto.page.user.signbook.SignBookFullDto"*/-->
<!--/*@thymesVar id="signRequest" type="org.esupportail.esupsignature.entity.SignRequest"*/-->
<!--/*@thymesVar id="signRequests" type="org.springframework.data.domain.Page<esupportail.esupsignature.entity.SignRequest>"*/-->
<!--/*@thymesVar id="statusFilter" type="org.esupportail.esupsignature.entity.enums.SignRequestStatus"*/-->
<!--/*@thymesVar id="form" type="org.esupportail.esupsignature.entity.Form"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<script type="module" th:src="'/js/modules/bootstrap/SignBooksListBootstrap.js?version=' + ${versionApp}"></script>
<body class="manage-signbooks-page" th:attr="data-status-filter=${statusFilter},
               data-recipients-filter=${recipientsFilter},
               data-workflow-filter=${workflowFilter},
               data-creator-filter=${creatorFilter},
               data-doc-title-filter=${docTitleFilter},
               data-date-filter=${dateFilter},
               data-infinite-scrolling=${infiniteScrolling},
               data-signbooks-mode=${'user/manage/workflow/' + workflow.id}">
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <ol class="breadcrumb">
                <li class="breadcrumb-item text-uppercase d-flex align-items-center"><a href="/user/manage"><i class="fi fi-rr-list-check"></i> Espace superviseurs</a></li>
                <li class="breadcrumb-item active"><span th:text="${workflow.description}"></span> <span class="mb-0" th:if="${hided}">(Demandes masquées)</span></li>
            </ol>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content d-flex">
                <div class="flex-grow-1">
                    <div class="table-fix-head scrollbar-style rounded-3 p-0 m-2">
                <table class="table table-light table-borderless table-hover">
                    <thead class="table-secondary">
                    <tr style="z-index: 2;">
                        <form>
                        <th class="text-center">
                            <select es-search-text="Titre du document" th:es-search-url="'/user/manage/workflow/' + ${workflow.id} + '/search-doc-titles'" id="docTitleFilter" class="slim-select-filter-search sign-request-filter" data-placeholder="Titre des documents" data-allow-deselect="true">
                                <option data-placeholder="true"></option>
                                <option value="all">Tout</option>
                            </select>
                        </th>
                        <th class="d-none d-lg-table-cell">
                            <select id="creatorFilter" class="auto-select-users sign-request-filter" data-es-check-cert="false" data-placeholder="Créateur" data-allow-deselect="true">
                                <option data-placeholder="true"></option>
                                <option value="all">Tout</option>
                            </select>
                        </th>
                        <th class="d-none d-xl-table-cell">
                            <div class="d-flex text-center">
                                <input type="date" id="dateFilter" name="dateFilter" placeholder="Date de création" title="Date de création" class="form-control date sign-request-filter" th:value="${dateFilter}">
                                <th:block th:with="order=${signBooks.sort.getOrderFor('createDate')}">
                                    <a sd:pagination-sort="createDate" class="sorted my-auto text-center ms-1" th:classappend="${order == null ? 'text-dark' : 'text-primary'}" style="text-decoration: none;">
                                        <i th:if="${order != null && order.direction.name() == 'ASC'}" class="fi fi-rr-sort-amount-down"></i>
                                        <i th:if="${order != null && order.direction.name() == 'DESC'}" class="fi fi-rr-sort-amount-up"></i>
                                        <i th:if="${order == null}" class="fi fi-rr-sort-alt"></i>
                                    </a>
                                </th:block>
                            </div>
                        </th>
                        <th class="d-none d-lg-table-cell">
                            <select id="recipientsFilter" class="auto-select-users sign-request-filter" data-es-check-cert="false" data-placeholder="Participants" data-allow-deselect="true">
                                <option data-placeholder="true"></option>
                                <option value="all">Tout</option>
                            </select>
                        </th>
                        <th class="d-none d-xxl-table-cell">
                            <th:block th:with="order=${signBooks.sort.getOrderFor('endDate')}">
                                <a sd:pagination-sort="endDate" class="sorted" th:classappend="${order == null ? 'text-dark' : 'text-primary'}" style="text-decoration: none;">
                                    Date dernière modification&nbsp;
                                    <i th:if="${order != null && order.direction.name() == 'ASC'}" class="fi fi-rr-sort-amount-down"></i>
                                    <i th:if="${order != null && order.direction.name() == 'DESC'}" class="fi fi-rr-sort-amount-up"></i>
                                    <i th:if="${order == null}" class="fi fi-rr-sort-alt"></i>
                                </a>
                            </th:block>
                        </th>
                        <th class="d-none d-md-table-cell">
                            <div class="d-flex text-center">
                            <select class="slim-select-filter sign-request-filter" name="statusFilter" id="statusFilter">
                                <option value="" data-placeholder="true">Choisir un statut</option>
                                <option value="all">Tous</option>
                                <option value="deleted">Supprimé</option>
                                <th:block th:each="status : ${statuses}">
                                    <option th:if="${status.name == statusFilter}" th:value="${status}"
                                            selected="selected"
                                            th:text="#{'signbook.status.' + ${status}}"></option>
                                    <option th:unless="${status == statusFilter}" th:value="${status}"
                                            th:text="#{'signbook.status.' + ${status}}"></option>
                                </th:block>
                            </select>
                            <th:block th:with="order=${signBooks.sort.getOrderFor('status')}">
                                <a sd:pagination-sort="status" class="sorted my-auto text-center ms-1" th:classappend="${order == null ? 'text-dark' : 'text-primary'}" style="text-decoration: none;">
                                    <i th:if="${order != null && order.direction.name() == 'ASC'}" class="fi fi-rr-sort-amount-down"></i>
                                    <i th:if="${order != null && order.direction.name() == 'DESC'}" class="fi fi-rr-sort-amount-up"></i>
                                    <i th:if="${order == null}" class="fi fi-rr-sort-alt"></i>
                                </a>
                            </th:block>
                            </div>
                        </th>
                        <th >Actions</th>
                        </form>
                    </tr>
                    </thead>
                    <tbody>
                    <th:block th:each="signBook : ${signBooks}">
                        <tr th:data-href="'/user/signbooks/' + ${signBook.id}">
<!--                                    <td class="w-20 d-none d-lg-table-cell">-->
<!--                                        <input type="checkbox" class="form-check-input" class="sign-requests-ids" name="ids[]" th:value="${signRequest.id}" th:data-es-signrequest-status="${signRequest.status}"-->
<!--                                               th:data-es-sign-type="${signBookLight.liveWorkflow.currentStep != null ? signBookLight.liveWorkflow.currentStep.signType : ''}"-->
<!--                                               th:data-es-signbook-id="${signBookLight.id}">-->
<!--                                    </td>-->
                            <td class="clickable-td text-break"><i class="fi fi-rr-file"></i> <span th:text="${signBook.subject}"></span></td>
                            <td class="clickable-td d-none d-lg-table-cell" th:text="${signBook.createByDisplayName}"></td>
                            <td class="clickable-td d-none d-xl-table-cell"><span th:text="${signBook.primarySignRequest != null ? signBook.primarySignRequest.createDateLabel : ''}"></span>
                            </td>
                            <td class="d-none d-lg-table-cell no-row-navigation">
                                <div th:with="currentParticipantStep=${signBook.currentParticipantStep}">
                                    <select class="participant-step-select"
                                            aria-label="Participants"
                                            th:id="'participantStepSelect-manage-' + ${signBook.id}"
                                            th:title="${currentParticipantStep != null ? currentParticipantStep.recipientsSummary : 'Participants'}">
                                        <option th:each="participantStep : ${signBook.participantSteps}"
                                                th:with="isCurrentStep=${currentParticipantStep != null and participantStep.stepNumber == currentParticipantStep.stepNumber},
                                                         statusIcon=${participantStep.statusKey != null ? #messages.msg('signbook.participant.status.icon.' + participantStep.statusKey) : ''},
                                                         statusTitle=${participantStep.statusKey != null ? #messages.msg('signbook.participant.status.title.' + participantStep.statusKey) : ''}"
                                                th:value="${participantStep.stepNumber}"
                                                th:selected="${isCurrentStep}"
                                                th:text="${'Étape ' + participantStep.stepNumber + ' - ' + (participantStep.recipientsSummary != null ? participantStep.recipientsSummary : '')}"
                                                th:attr="data-step-number=${participantStep.stepNumber},data-summary=${participantStep.recipientsSummary},data-current-step=${isCurrentStep},data-current-label=#{signbook.participant.current},data-status-icon=${statusIcon},data-status-title=${statusTitle}">
                                        </option>
                                    </select>
                                </div>
                            </td>
                            <td class="clickable-td d-none d-xxl-table-cell">
                                <span th:if="${signBook.endDateLabel != null}" th:text="${signBook.endDateLabel}"></span>
                                <span th:unless="${signBook.endDateLabel != null}" th:text="${signBook.lastSignedDocumentDateLabel}"></span>
                            </td>
                            <td class="clickable-td d-none d-md-table-cell"
                                style="width: 150px;">
                                <div th:with="refusedCommentTitle=${signBook.refusedCommentTitle}" th:replace="~{user/signbooks/includes/status :: status(signBookLight=${signBook})}"></div>
                            </td>
                            <td>
                                <div class="dropdown position-relative">
                                    <button type="button" th:id="'menu-toggle_' + ${signBook.id}" class="btn text-dark" th:data-bs-target="'#menu-' + ${signBook.id}" th:aria-controls="'menu-' + ${signBook.id}" data-bs-toggle="dropdown">
                                        <i class="fi fi-rr-menu-dots-vertical"></i>
                                    </button>
                                    <ul class="dropdown-menu position-absolute ps-2 pe-2" th:id="'menu-' + ${signBook.id}">
                                        <li>
                                            <a th:unless="${signBook.status == 'pending' && statusFilter == 'toSign'}" class="btn btn-transparent text-dark text-left col-12" role="button" th:href="'/user/signbooks/' + ${signBook.id}">
                                                <i class="fi fi-rr-eye pr-2"></i> Consulter
                                            </a>
                                        </li>
                                        <li>
                                            <form th:if="${signBook.displayNotif && signBook.primarySignRequest != null}" th:action="'/user/signrequests/replay-notif/' + ${signBook.primarySignRequest.id}" method="post">
                                                <button type="submit" class="btn btn-transparent text-dark text-left col-12">
                                                    <i class="fi fi-rr-bullhorn"></i> <span class="d-none d-xxl-inline">Relancer</span>
                                                </button>
                                            </form>
                                        </li>
                                        <li>
                                            <a target="_blank" th:if="${signBook.signRequestCount == 1 && signBook.primarySignRequest != null}" class="btn btn-transparent text-dark text-left col-12" role="button"
                                                th:href="'/user/manage/workflow/' + ${workflow.id} + '/get-last-file/' + ${signBook.primarySignRequest.id}">
                                                <i class="fi fi-rr-download pr-2"></i> Télécharger
                                            </a>
                                        </li>
                                        <li>
                                            <a th:if="${signBook.deleted}" class="btn btn-transparent text-dark text-left col-12" th:href="'/user/signbooks/restore/' + ${signBook.id}" role="button">
                                                <i class="fi fi-rr-trash-restore-alt pr-2"></i> Restaurer
                                            </a>
                                        </li>
                                        <li>
                                            <a th:if="${!signBook.hiddenByCurrentUser}" class="btn btn-transparent text-dark text-left col-12" role="button" th:href="'/user/signbooks/toggle/' + ${signBook.id} + '?statusFilter=' + ${statusFilter}">
                                                <i class="fi fi-rr-eye-crossed pr-2"></i> Masquer
                                            </a>
                                        </li>
                                        <li>
                                            <a th:if="${!signBook.deleted}" class="btn btn-transparent text-dark text-left col-12" th:href="'#modal-warning-' + ${signBook.id}" role="button" data-bs-toggle="modal" th:data-bs-target="'#modal-warning-' + ${signBook.id}">
                                                <i class="fi fi-rr-trash pr-2"></i> Supprimer
                                            </a>
                                        </li>
                                        <li>
                                            <a th:if="${!signBook.deleted}" class="btn btn-transparent text-dark text-left col-12" th:href="'#modal-warning-' + ${signBook.id}" role="button" data-bs-toggle="modal" th:data-bs-target="'#modal-warning-' + ${signBook.id}">
                                                <i class="fi fi-rr-trash-xmark pr-2"></i> Vider
                                            </a>
                                        </li>
                                    </ul>
                                </div>

                                <div data-bs-focus="false" class="modal modal-warning fade in" th:id="'modal-warning-' + ${signBook.id}">
                                    <div class="modal-dialog">
                                        <div class="modal-content">
                                            <form th:id="'signBookDel' + ${signBook.id}" th:action="'/user/signbooks/'+ ${signBook.id}" th:method="delete">
                                                <div class="modal-header">
                                                    <h2>Attention</h2>
                                                    <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close">

                                                    </button>
                                                </div>
                                                <div class="modal-body">
                                                    <div class="alert alert-danger">Confirmez-vous la suppression de cette demande ?</div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary float-start" data-bs-dismiss="modal">Non</button>
                                                    <button type="submit" class="btn btn-danger">Oui</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </th:block>
                    </tbody>
                    <tfoot>
                    <tr>
                        <td th:replace="~{fragments/pagination :: pagination}"></td>
                    </tr>
                    </tfoot>
                </table>
                    </div>
                </div>
                <div id="signButtons" class="es-fixed-action-btns active">
                    <ul id="buttonList" class="list-unstyled">
                        <li th:if="${hided}">
                            <a th:href="'/user/manage/workflow/' + ${workflow.id} + '/signbooks'" type="button" class="btn btn-transparent text-dark" title="Afficher les demandes non masquées">
                                <i class="fi fi-rr-eye " style="margin-top: 10px;"></i>
                            </a>
                        </li>
                        <li th:unless="${hided}">
                            <a th:href="'/user/manage/workflow/' + ${workflow.id} + '/signbooks?hided=true'" type="button" class="btn btn-transparent text-dark" title="Afficher les demandes masquées">
                                <i class="fi fi-rr-eye-crossed " style="margin-top: 10px;"></i>
                            </a>
                        </li>
                        <li>
                            <a th:unless="${form != null}" th:href="'user/manage/workflow/' + ${workflow.id} + '/datas/csv'" type="button" class="btn btn-transparent text-dark">
                                <i class="fi fi-rr-file-csv " style="margin-top: 10px;"></i>
                            </a>
                        </li>
                        <li>
                            <a th:if="${form != null}" th:href="'/user/manage/form/' + ${form.id} + '/datas/csv'" class="btn btn-transparent text-dark">
                                <i class="fi fi-rr-file-csv"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
