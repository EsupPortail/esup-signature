<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="showSignRequest" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto"*/-->
<!--/*@thymesVar id="signRequestFull" type="org.esupportail.esupsignature.dto.page.user.signrequest.SignRequestFullDto"*/-->
<!--/*@thymesVar id="signRequestLight" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto.SignRequestLightDto"*/-->
<div th:fragment="update-signbook">
<div data-bs-focus="false"
     class="modal fade"
     id="updateSignbookModal"
     role="dialog"
     aria-labelledby="updateSignbookLabel"
     aria-hidden="true"
     th:if="${signRequestFull.manager && (signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending || signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft)}">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <form id="params" th:action="'/user/signbooks/update/' + ${showSignRequest.signBookLight.id}" th:method="put">
                <div class="modal-header">
                    <h3 class="modal-title" id="updateSignbookLabel">Paramètres généraux</h3>
                    <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group mb-3">
                        <label for="subject">Titre</label>
                        <input type="text" class="form-control" name="subject" id="subject" th:value="${showSignRequest.signBookLight.subject}">
                    </div>
                    <div class="form-group mb-3">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" class="form-control" th:text="${showSignRequest.signBookLight.description}"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="viewersSelect">Observateurs</label>
                        <select id="viewersSelect" class="auto-select-users" multiple="multiple" name="viewers">
                            <th:block th:each="viewer : ${showSignRequest.signBookLight.viewers}">
                                <option selected="selected" th:value="${viewer.email}" th:text="${viewer.firstname + ' ' + viewer.name + ' (' + viewer.email + ')'}"></option>
                            </th:block>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-success">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
</html>
