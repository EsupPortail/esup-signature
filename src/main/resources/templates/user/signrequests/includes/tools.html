<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="showSignRequest" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto"*/-->
<!--/*@thymesVar id="signRequestFull" type="org.esupportail.esupsignature.dto.page.user.signrequest.SignRequestFullDto"*/-->
<!--/*@thymesVar id="signRequestLight" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto.SignRequestLightDto"*/-->
<!--/*@thymesVar id="globalProperties" type="org.esupportail.esupsignature.config.GlobalProperties"*/-->
<div th:fragment="tools" id="tools" class="es-tools position-fixed signrequest-tools-loading-shell" role="toolbar" aria-label="Actions principales de signature" th:if="${showSignRequest.toSignDocumentContentType != null}">
    <div class="d-flex justify-content-center m-2 p-1 bg-white rounded-3 shadow-sm" th:if="${annotation != null}" style="min-height: 72px; height: auto;">
        <div class="alert p-3 bg-warning-subtle d-flex align-items-center h-100" style="pointer-events: none;" th:if="${signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending || signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft}">
            <i class="fi fi-rr-edit"></i> Mode annotation
        </div>
    </div>
    <div class="d-flex justify-content-around align-items-center m-2 bg-white rounded-3 shadow-sm"
         th:if="${annotation == null}"
         th:with="isCompletedRequest=${signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported}"
         style="min-height: 72px; height: auto;">
        <a tabindex="1" id="start-button" role="button" class="btn p-3 btn-success pulse-success" title="Démarrer le circuit" data-bs-toggle="modal" data-bs-target="#sendModal" th:if="${!signRequestFull.signable && signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft}">
            <i class="fi fi-rr-play-alt" style="margin-top: 0"></i> Envoyer la demande
        </a>
        <div class="alert p-3 m-0 bg-warning-subtle d-lg-flex d-none align-items-center h-100" style="pointer-events: none;" th:if="${!signRequestFull.signable && signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending}">
            <i class="fi fi-rr-pending"></i> En attente de signature
        </div>
        <div class="alert p-3 m-0 bg-danger-subtle d-lg-flex d-none align-items-center h-100" style="pointer-events: none;" th:if="${signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused}">
            <i class="fi fi-rr-flag"></i> Signature refusée
        </div>
        <div class="alert p-3 m-0 bg-success-subtle d-lg-flex d-none align-items-center h-100" style="pointer-events: none;" th:if="${isCompletedRequest}">
            <i class="fi fi-rr-flag"></i> Vous avez signé ce document
        </div>
        <a class="ms-1 d-flex justify-content-center btn btn-success p-3 d-flex h-100" th:if="${isCompletedRequest}" tabindex="1" th:href="'/ws-secure/global/get-last-file/' + ${signRequestLight.id}" target="_blank" title="Télécharger le document signé">
            <i class="fi fi-rr-download " style="margin-top: 0"></i> Télécharger le document signé
        </a>
        <a class="ms-1 d-flex justify-content-center btn btn-outline-success p-3 h-100"
           th:if="${isCompletedRequest && showSignRequest.nextSignRequestId != null}"
           tabindex="1"
           th:href="'/' + ${showSignRequest.urlProfil} + '/signrequests/' + ${showSignRequest.nextSignRequestId}"
           title="Aller à la demande suivante">
            <i class="fi fi-rr-arrow-small-right" style="margin-top: 0"></i> Aller à la suivante
        </a>
        <div class="es-steps-responsive-nav" th:if="${signRequestFull.signable}">
            <div class="steps-horizontal-v2 d-flex justify-content-center" style="width: 100%;">
                <div id="step-1" class="step-horizontal-v2 d-flex gap-2 align-items-center active" th:if="${signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa && showSignRequest.toSignDocumentContentType == 'application/pdf'}">
                    <div class="d-flex align-items-center gap-2">
                        <div class="step-horizontal-v2-icon">
                            1
                        </div>
                    </div>
                    <div class="step-horizontal-v2-content">
                        <div class="text-xs font-bold d-flex align-items-center gap-1">
                            <div class="d-flex flex-nowrap" style="flex: 1 1 0;">
                                <button tabindex="3" id="addSignButton2" role="button" class="btn p-3 btn-success pulse-success">
                                    <i class="fi fi-rr-file-signature"></i> Insérer une signature
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="step-2" class="step-horizontal-v2 d-flex gap-2 align-items-center active"
                     th:classappend="${signRequestFull.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa || showSignRequest.toSignDocumentContentType != 'application/pdf'} ? ' justify-content-center' : ''">
                    <div class="d-flex align-items-center gap-2" th:if="${signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa && showSignRequest.toSignDocumentContentType == 'application/pdf'}">
                        <div class="step-horizontal-v2-icon">
                            2
                        </div>
                    </div>
                    <div class="step-horizontal-v2-content d-flex align-items-center gap-1"
                         th:classappend="' justify-content-center flex-grow-0 flex-nowrap'"
                         th:styleappend="'flex:0 0 auto;'">
                        <div id="signActionButtons" class="input-group d-flex align-items-center justify-content-center p-1 bg-secondary-subtle rounded-2">
                            <button tabindex="1" id="signLaunchButton" role="button"
                                    class="btn" style="margin-right: 2px; width: 230px; height: 58px;"
                                    th:classappend="${(signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).visa && signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa ? ' es-quick-sign-action' : '') + (signRequestFull.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa ? ' btn-success pulse-success' : (signRequestFull.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).visa ? ' d-none' : ' btn-secondary d-none'))}"
                                    th:styleappend="''">
                                <div class="d-flex flex-column justify-content-start">
                                    <div class="d-flex align-items-center">
                                        <i th:class="${signRequestFull.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa} ? 'fi fi-rr-registration-paper' : 'fi fi-rr-signature-lock'" style="margin-top: 0; border: 0"></i>
                                        <span th:if="${signRequestFull.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}"> Valider le document</span>
                                        <span th:if="${signRequestFull.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).visa}"> Valider le visa</span>
                                        <span th:if="${signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).visa && signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}"> Signature rapide</span>
                                    </div>
                                    <i style="text-align:left; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;" id="signTypeLabel"></i>
                                </div>
                            </button>
                            <button th:if="${signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).visa && signRequestFull.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" tabindex="1" id="signAdvancedLaunchButton" role="button"
                                    class="btn p-3 d-none" style="height: 58px;">
                                <i class="fi fi-rr-customize" style="margin-top: 0; border: 0"></i> Personnaliser
                            </button>
                        </div>
                        <div th:id="'refuseLaunchDiv'"
                             th:if="${signRequestFull.currentStepNumber > 1 || signRequestLight.createBy.eppn != userEppn}"
                             class="d-flex align-items-center gap-1"
                             th:classappend="${signRequestFull.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa} ? '' : ' es-refuse-slot-hidden'"
                             th:styleappend="'width:auto;flex:0 0 auto;'">
                            ou
                            <button tabindex="1" th:id="'refuseLaunchButton'" class="btn p-3 btn-danger"
                                    th:styleappend="'width:auto;max-width:none;flex:0 0 auto;'"
                                    th:token="${signRequestLight.token}" data-bs-toggle="modal" data-bs-target="#refuseModal">
                                <i class="fi fi-rr-document-circle-wrong "></i> Refuser
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="refuseLaunchDivResponsive" class="es-tools-responsive-refuse d-xxxl-none"
             th:if="${signRequestFull.signable && (signRequestFull.currentStepNumber > 1 || signRequestLight.createBy.eppn != userEppn)}">
            <button tabindex="1" class="btn p-3 btn-danger" title="Refuser"
                    th:token="${signRequestLight.token}" data-bs-toggle="modal" data-bs-target="#refuseModal">
                <i class="fi fi-rr-document-circle-wrong "></i> Refuser
            </button>
        </div>
    </div>
</div>
</html>
