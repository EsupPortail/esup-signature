<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="globalProperties" type="org.esupportail.esupsignature.config.GlobalProperties"*/-->
<div th:fragment="tools" id="tools" class="tools p-2  position-fixed" th:if="${toSignDocument != null}">
    <div class="m-2 p-2 bg-white rounded-3 shadow-sm">
    <ul id="ws-tabs" class="nav nav-tabs" th:if="${nbSignRequestInSignBookParent > 1}">
        <th:block th:each="signRequestTab : ${signRequest.parentSignBook.signRequests}">
            <li class="nav-item ws-tab" th:classappend="${(signRequest.id == signRequestTab.id ? 'active' : '') + ' ' + (nbSignRequestInSignBookParent > 1 ? 'file-tab' : '')}">
                <a tabindex="0" class="nav-link" th:classappend="${(signRequest.id == signRequestTab.id ? 'current alert-secondary' : '') + ' ' + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).checked ? 'bg-success text-light' : '') + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || (signRequestTab.deleted || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused) ? 'bg-danger text-light' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending) ? 'bg-warning text-dark' : '')}"
                   th:href="${urlProfil} + '/signrequests/' + ${signRequestTab.id}">
                    <div class="truncate">
                        <span title="À signer" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending}">
                            <i class="fa-solid fa-clock" th:classappend="${(signRequest.id == signRequestTab.id ? 'text-warning' : 'text-dark')}"></i>
                            <span th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                        </span>
                        <span title="Document signé" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned}"
                              th:classappend="${(signRequest.id == signRequestTab.id ? 'text-success' : 'text-light')}">
                            <i class="fa-solid fa-check-circle"></i>
                            <span th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                        </span>
                        <span title="Document refusé" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused}"
                              th:classappend="${(signRequest.id == signRequestTab.id ? 'text-danger' : 'text-light')}">
                            <i class="fa-solid fa-times-circle"></i>
                            <span th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                        </span>
                        <span title="Document supprimé" th:if="${signRequestTab.deleted}"
                              th:classappend="${(signRequest.id == signRequestTab.id ? 'text-danger' : 'text-light')}">
                            <i class="fa-solid fa-stop-circle"></i>
                            <span th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                        </span>
                        <span th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft}">
                            <i class="fa-solid fa-file"></i>
                            <span th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                        </span>
                    </div>
                </a>
            </li>
        </th:block>
        <li class="nav-item dropdown d-none">
            <a class="nav-link dropdown-toggle" href="#" id="DropdownMenu" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" data-diplay="static">
                Suite des documents
            </a>
            <ul class="dropdown-menu p-2 dropdown-menu-right" aria-labelledby="DropdownMenu">
            </ul>
        </li>
    </ul>
        <div class=" d-flex justify-content-around">
        <div class="steps-horizontal-v2">
            <div class="step-horizontal-v2 active">
                <div class="step-horizontal-v2-icon">
                    1
                </div>
                <div class="step-horizontal-v2-content">
                    <span class="text-xs font-bold d-flex align-items-center gap-1">
                        Étape 1 :
                        <div id="insert-btn-div">
                        <button id="insert-btn" th:if="${editable}" class="h-100 d-flex align-items-center btn btn-success"
                                data-bs-toggle="collapse" href="#second-tools">
                            <i class="fi fi-rr-multiple" style="font-size: 18px; padding-bottom: 2px;"></i><span class="d-none d-xxl-inline"> Insérer une signature<i class="fi fi-rr-caret-down"></i></span>
                        </button>
                        <div id="second-tools" class="second-tools position-fixed collapse">
                            <th:block th:if="${toSignDocument.contentType == 'application/pdf' && (signRequest.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft || signRequest.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending || comments.size() > 0)}">
                                <div id="signTools" th:if="${toSignDocument.contentType == 'application/pdf' && signable}" class="alert alert-light d-flex flex-column text-start gap-1 shadow">
                                    <button th:if="${signRequest.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).signature}"
                                            id="addSignButton"
                                            role="button"
                                            class="d-flex align-items-center btn btn-transparent text-success btn-outline-success text-start">
                                        <i class="fi fi-rr-file-signature"></i> <span class="d-inline"> Insérer une signature</span>
                                    </button>
                                    <button th:if="${signRequest.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).visa}"
                                            id="addSignButton"
                                            role="button"
                                            class="d-flex align-items-center btn btn-transparent text-success btn-outline-success text-start">
                                        <i class="fi fi-rr-file-signature"></i> <span class="d-inline"> Insérer un visa</span>
                                    </button>
                                    <button th:if="${signRequest.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}"
                                            id="addParaphButton2"
                                            role="button"
                                            class="d-flex align-items-center btn btn-transparent text-success btn-outline-success text-start">
                                        <i class="fi fi-rr-multiple-alt"></i> <span class="d-inline"> Insérer un paraphe</span>
                                    </button>
                                    <button th:if="${signatureIds.size() == 0 && isNotSigned && signRequest.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" id="addCheck" class="d-flex align-items-center btn btn-light btn-outline-dark text-dark  text-start"
                                            th:classappend="${signBook.liveWorkflow.currentStep.multiSign || signBook.liveWorkflow.currentStep.singleSignWithAnnotation} ? '' : 'disabled'">
                                        <i class="fi fi-rr-check"></i> Insérer une coche
                                    </button>
                                    <button th:if="${signatureIds.size() == 0 && isNotSigned && signRequest.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" id="addTimes" class="d-flex align-items-center btn btn-light btn-outline-dark text-dark  text-start"
                                            th:classappend="${signBook.liveWorkflow.currentStep.multiSign || signBook.liveWorkflow.currentStep.singleSignWithAnnotation} ? '' : 'disabled'">
                                        <i class="fi fi-rr-cross"></i> Insérer une croix
                                    </button>
                                    <button th:if="${signatureIds.size() == 0 && isNotSigned && signRequest.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" id="addCircle" class="d-flex align-items-center btn btn-light btn-outline-dark text-dark  text-start"
                                            th:classappend="${signBook.liveWorkflow.currentStep.multiSign || signBook.liveWorkflow.currentStep.singleSignWithAnnotation} ? '' : 'disabled'">
                                        <i class="fi fi-rr-circle"></i> Insérer un cercle
                                    </button>
                                    <button th:if="${signatureIds.size() == 0 && isNotSigned && signRequest.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" id="addMinus" class="d-flex align-items-center btn btn-light btn-outline-dark text-dark  text-start"
                                            th:classappend="${signBook.liveWorkflow.currentStep.multiSign || signBook.liveWorkflow.currentStep.singleSignWithAnnotation} ? '' : 'disabled'">
                                        <i class="fi fi-rr-minus"></i> Insérer un trait
                                    </button>
                                    <button th:if="${signatureIds.size() == 0 && isNotSigned && signRequest.currentSignType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" id="addText" class="d-flex align-items-center btn btn-light btn-outline-dark text-dark  text-start"
                                            th:classappend="${signBook.liveWorkflow.currentStep.multiSign || signBook.liveWorkflow.currentStep.singleSignWithAnnotation} ? '' : 'disabled'">
                                        <i class="fi fi-rr-text"></i> Insérer un texte
                                    </button>
                                    <button th:if="${signatureIds.size() == 0 && isNotSigned && signRequest.currentSignType == T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" class="d-flex align-items-center btn btn-light btn-outline-dark text-dark  text-start"
                                            th:classappend="${signBook.liveWorkflow.currentStep.multiSign || signBook.liveWorkflow.currentStep.singleSignWithAnnotation} ? '' : 'disabled'">
                                        <i class="fi fi-rr-octagon-xmark"></i> Non disponible pour un visa caché
                                    </button>
                                </div>
                            </th:block>
                        </div>
                    </div>
                        <div th:if="${signable && (currentStepNumber > 1 || signRequest.createBy.eppn != userEppn)}">
                        ou
                            <button tabindex="1" id="refuseLaunchButton" class="btn btn-danger border-0 d-none" title="Refuser"
                                    th:token="${signRequest.token}" data-bs-toggle="modal" data-bs-target="#refuseModal">
                                <i class="fi fi-rr-document-circle-wrong "></i> Refuser
                            </button>
                        </div>

                    </span>
                </div>
            </div>
            <div class="step-horizontal-v2 disable">
                <div class="step-horizontal-v2-icon">2</div>
                <div class="step-horizontal-v2-content">
                    <span class="text-xs font-bold">Étape 2 : Valider</span>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
</html>
