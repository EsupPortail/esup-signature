<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="showSignRequest" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto"*/-->
<!--/*@thymesVar id="signRequestFull" type="org.esupportail.esupsignature.dto.page.user.signrequest.SignRequestFullDto"*/-->
<!--/*@thymesVar id="signRequestLight" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto.SignRequestLightDto"*/-->
<div id="workspace" tabindex="1" th:fragment="workspace" th:if="${showSignRequest.toSignDocumentContentType == 'application/pdf'}" class="alert rounded-bottom-0 light border-0 justify-content-center" th:classappend="(${signRequestFull.nbSignRequests > 1} ? 'es-workspace-sign' : 'es-workspace-pdf workspace-margin-top') + ' ' + (${signRequestFull.signable && signRequestLight.status != T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed}? '' : '')">
    <div id="pdf-progress-bar" class="es-pdf-progress-overlay" aria-live="polite" aria-atomic="true">
        <div class="es-pdf-progress-card shadow-sm">
            <div class="es-pdf-progress-label">Chargement du document…</div>
            <div class="progress">
                <div class="progress-bar bg-dark" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
    </div>
    <form id="signForm" th:action="''">
        <input id="checkDataSubmit" type="submit" style="display: none;"/>
        <div tabindex="0" id="pdf">
            <th:block th:each="comment : ${signRequestFull.comments}">
                <div class="circle"
                     th:id="'inDocComment_' + ${comment.id}"
                     th:onmouseover="'$(\'#annotation_' + ${comment.id} + '\').addClass(\'circle-border\');'"
                     th:onmouseout="'$(\'#annotation_' + ${comment.id} + '\').removeClass(\'circle-border\');'"
                     th:title="${comment.text}"
                     th:es-comment-text="${comment.text}"
                     th:es-comment-title="${comment.createBy.firstname + ' ' + comment.createBy.name + ' ' + #dates.format(comment.createDate, 'dd/MM/yyyy HH:mm')}"
                     th:es-comment-delete="${signRequestFull.commentDeleteAllowed || (authUserEppn != null && comment.createBy != null && comment.createBy.eppn == authUserEppn && (#strings.equals(signRequestFull.status, 'draft') || #strings.equals(signRequestFull.status, 'pending')))}">
                    <i class="fi fi-sr-comment" style="font-size: 30px; color: var(--bs-warning)"></i>
                </div>
            </th:block>
            <!-- inDocSpot_ removed: signSpace_ is now the single front representation for slots -->
        </div>
    </form>
    <div id="crossTools_x" class="badge bg-light position-absolute cross-tools d-none">
        <div id="defaultTools_x" class="">
            <button type="button" id="signDrop_x"
                    title="Supprimer la signature"
                    class="btn btn-sm btn-light"
                    style="z-index: 3;">
                <i class="fi fi-rr-trash"></i>
            </button>
            <button id="canvasBtn_x" type='button' class="btn btn-sm btn-light" title='Dessiner ma signature'>
                <i class="fi fi-rr-drawer-alt"></i>
            </button>
            <button type="button" id="textReduce_x"
                    title="Agrandir le text"
                    class="btn btn-sm btn-light"
                    style="z-index: 3; display: none">
                <b style="font-size: 11px;">A</b>
            </button>
            <button type="button" id="textGrow_x"
                    title="Reduire le text"
                    class="btn btn-sm btn-light"
                    style="z-index: 3; display: none">
                <b style="font-size: 15px;">A</b>
            </button>
            <button type="button" id="signUndo_x"
                    class="btn btn-sm btn-light d-none"
                    style="z-index: 3;">
                <i class="fi fi-rr-refresh"></i>
            </button>
            <button type="button" id="signPrevImage_x"
                    title="Signature précédente"
                    class="btn btn-sm btn-light"
                    style="z-index: 3;">
                <i class="fi fi-rr-left"></i>
            </button>
            <button type="button" id="signNextImage_x"
                    title="Signature suivante"
                    class="btn btn-sm btn-light"
                    style="z-index: 3;">
                <i class="fi fi-rr-right"></i>
            </button>
            <button type="button" id="mobileCanvasBtn_x" class="btn btn-sm btn-light" title="Dessiner ma signature">
                <i class="fi fi-rr-pen-swirl"></i>
            </button>
            <button type="button" id="displayMoreTools_x"
                    title="Plus d'outils"
                    class="btn btn-sm btn-light"
                    style="z-index: 3;">
                <i class="fi fi-rr-menu-dots-vertical"></i>
            </button>
        </div>
        <div id="extraTools_x" class="alert p-2 opacity-100 bg-light border-secondary-subtle extra-tools d-flex flex-column d-none text-start gap-1" onclick="event.stopPropagation();">
            <input id="signColorPicker_x" value='#000000' class="d-none"/>
            <button th:if="${#authorization.expression('!hasRole(''ROLE_OTP'')')}" type="button" id="watermark_x"
                    title="Filigrane"
                    class="btn btn-sm btn-light text-start"
                    style="z-index: 3;">
                <i class="fi fi-rr-background"></i> Filigrane
            </button>
            <hr th:if="${#authorization.expression('!hasRole(''ROLE_OTP'')')}" style="margin: 1px;">
            <button th:if="${#authorization.expression('!hasRole(''ROLE_OTP'')')}" type="button" id="signExtra_x"
                    title="Ajouter les informations complémentaires (nom, date et heure...)"
                    class="btn btn-sm btn-light text-start d-none"
                    style="z-index: 3;">
                <i class="fi fi-rr-receipt"></i> Textes complémentaires
            </button>
            <button type="button" id="extraType_x"
                    title="Afficher/Masquer le type de signature"
                    class="btn btn-sm btn-light text-start"
                    style="z-index: 3;">
                <i class="fi fi-rr-shield-plus"></i> Type de signature
            </button>
            <button type="button" id="extraName_x"
                    title="Afficher/Masquer le nom"
                    class="btn btn-sm btn-light text-start"
                    style="z-index: 3;">
                <i class="fi fi-rr-user"></i> Prénom et nom
            </button>
            <button type="button" id="extraDate_x"
                    title="Afficher/Masquer la date"
                    class="btn btn-sm btn-light text-start"
                    style="z-index: 3;">
                <i class="fi fi-rr-clock"></i> Date de signature
            </button>
            <button type="button" id="extraText_x"
                    title="Ajouter/Masquer un texte libre"
                    class="btn btn-sm btn-light text-start"
                    style="z-index: 3;">
                <i class="fi fi-rr-text"></i> Texte libre
            </button>
            <hr style="margin: 1px;">
            <button type="button" id="signExtraOnTop_x"
                    title="Placer le texte en haut"
                    class="btn btn-sm btn-light text-start"
                    disabled
                    style="z-index: 3;">
                <i class="fi fi-rr-arrow-to-top"></i> <span>Texte en haut</span>
            </button>
            <button type="button" id="signExtraRight_x"
                    title="Placer le texte à droite"
                    class="btn btn-sm btn-light text-start"
                    disabled
                    style="z-index: 3;">
                <i class="fi fi-rr-arrow-to-right"></i> <span>Texte à droite</span>
            </button>
            <button th:if="${#authorization.expression('!hasRole(''ROLE_OTP'')') && signRequestFull.notSigned && signRequestFull.currentStepMultiSign}" type="button" id="allPages_x"
                    title="Répéter sur toutes les pages"
                    class="btn btn-sm btn-light text-start"
                    style="z-index: 3;">
                <i class="fi fi-rr-bring-forward"></i> Répéter
            </button>
            <button th:if="${#authorization.expression('!hasRole(''ROLE_OTP'')')}" type="button" id="signImage_x"
                    title="Masquer l'image de votre signature"
                    class="btn btn-sm btn-light text-start"
                    style="z-index: 3;">
                <i class="fi fi-rr-eye-crossed"></i> Masquer l'image
            </button>
        </div>
    </div>
    <div id="spot-modal" data-bs-focus="false" class="modal text-black">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Valider l'ajout de l'emplacement</h4>
                </div>
                <div class="modal-body">
                    <form id="spot-form">
                        <input id="submit-spot" name="submitPostit" type="submit" class="d-none"/>
                        <input id="spotPosX" name="commentPosX" type="hidden"/>
                        <input id="spotPosY" name="commentPosY" type="hidden"/>
                        <input id="spotPageNumber" name="commentPageNumber" type="hidden"/>
                        <div id="divSpotStepNumber" class="form-group mb-3" th:if="${showSignRequest.steps != null and #lists.size(showSignRequest.steps) > 1}">
                            <label for="spotStepNumber">Choisir l’étape concernée</label>
                            <br/>
                            <select id="spotStepNumber" name="spotStepNumber" class="slim-select-simple">
                                <option data-placeholder="true" readonly="" value="">Choisir une étape</option>
                                <th:block th:each="step, iterator : ${showSignRequest.steps}">
                                    <option th:if="${step.signType != T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa}" th:text="'Etape ' + ${iterator.index + 1}" th:value="${iterator.index + 1}" th:selected="${showSignRequest.liveWorkflowStepCount == 1}" th:attr="data-es-all-sign-to-complete=${step.allSignToComplete},data-es-recipient-count=${#lists.size(step.recipients)}"></option>
                                </th:block>
                            </select>
                        </div>
                        <th:block th:if="${showSignRequest.steps != null and #lists.size(showSignRequest.steps) == 1}" th:with="singleStep=${showSignRequest.steps[0]}">
                            <input type="hidden" id="spotStepNumberHidden" name="spotStepNumber" value="1" th:attr="data-es-all-sign-to-complete=${singleStep.allSignToComplete},data-es-recipient-count=${#lists.size(singleStep.recipients)}">
                        </th:block>
                        <div id="divSpotRecipientId" class="form-group mb-3 d-none">
                            <label for="spotRecipientId">Choisir le destinataire concerné</label>
                            <br/>
                            <select id="spotRecipientId" name="recipientId" class="slim-select-simple">
                                <option data-placeholder="true" readonly="" value="">Choisir un destinataire</option>
                            </select>
                        </div>
                        <button id="hideSpotButton" type="button" class="btn btn-sm btn-secondary float-start" data-bs-dismiss="modal">
                            Annuler
                        </button>
                        <button id="save-spot-button" th:data-es-signrequest-id="${signRequestLight.id}" type="button" class="btn btn-sm btn-success float-end">
                            <i class="fi fi-rr-disk"></i> Enregistrer
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <button id="end-button" th:unless="${showSignRequest.viewedByCurrentUser}" class="btn not-viewed jumping not-viewed-position" title="Pour valider la lecture du document, il faut le faire défiler jusqu'à la dernière page">
        <i class="fi fi-rr-arrow-down-to-dotted-line fa-2x d-none d-sm-block"></i>
    </button>

</div>
