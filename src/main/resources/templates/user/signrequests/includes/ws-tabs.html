<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="signRequest" type="org.esupportail.esupsignature.entity.SignRequest"*/-->
<!--/*@thymesVar id="urlProfil" type="java.lang.String"*/-->
<ul th:fragment="ws-tabs" id="ws-tabs" class="nav nav-tabs es-signrequest-workspace-header">
    <th:block th:each="signRequestTab, signRequestTabStat : ${signRequest.parentSignBook.signRequests}" th:if="${signRequest.id == signRequestTab.id}">
        <li class="nav-item ws-tab-nav">
            <a th:if="${signRequestTabStat.index > 0}"
               class="nav-link"
               th:href="${urlProfil} + '/signrequests/' + ${signRequest.parentSignBook.signRequests[signRequestTabStat.index - 1].id}"
               title="Document precedent">
                <i class="fi fi-rr-angle-small-left" style="font-size: 20px;"></i>
            </a>
            <span th:unless="${signRequestTabStat.index > 0}" class="nav-link disabled" title="Premier document">
                <i class="fi fi-rr-angle-small-left" style="font-size: 20px;"></i>
            </span>
        </li>
        <li class="nav-item ws-tab-nav">
            <span class="d-flex p-1 flex-column nav-link current align-items-center">
                <span class="text-uppercase text-dark" style="font-size: 10px">Document</span>
                <span class="text-uppercase" style="font-size: 13px"
                      th:text="(${signRequestTabStat.index + 1}) + '/' + (${#lists.size(signRequest.parentSignBook.signRequests)})"></span>
            </span>
        </li>
        <li class="nav-item ws-tab-nav">
            <a th:if="${signRequestTabStat.index + 1 < #lists.size(signRequest.parentSignBook.signRequests)}"
               class="nav-link"
               th:href="${urlProfil} + '/signrequests/' + ${signRequest.parentSignBook.signRequests[signRequestTabStat.index + 1].id}"
               title="Document suivant">
                <i class="fi fi-rr-angle-small-right" style="font-size: 20px;"></i>
            </a>
            <span th:unless="${signRequestTabStat.index + 1 < #lists.size(signRequest.parentSignBook.signRequests)}" class="nav-link disabled" title="Dernier document">
                <i class="fi fi-rr-angle-small-right" style="font-size: 20px;"></i>
            </span>
        </li>
    </th:block>
    <th:block th:each="signRequestTab : ${signRequest.parentSignBook.signRequests}">
        <li class="nav-item ws-tab file-tab" th:classappend="${signRequest.id == signRequestTab.id ? 'active' : ''}">
            <a tabindex="0" class="nav-link" th:classappend="${(signRequest.id == signRequestTab.id ? 'current alert-secondary' : '') + ' ' + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).checked ? 'bg-success-subtle text-dark' : '') + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || (signRequestTab.deleted || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused) ? 'bg-danger text-light' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending) ? 'bg-warning-subtle text-dark' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft) ? 'bg-secondary-subtle text-dark' : '')}"
               th:href="${urlProfil} + '/signrequests/' + ${signRequestTab.id}">
                <div class="truncate">
                    <span title="À signer" class="d-flex align-items-center" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending}">
                        <i class="fi fi-rr-document" style="font-size: 18px;"></i> 
                        <span class="text-uppercase p-0 m-0 es-signrequest-workspace-title" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                    </span>
                    <span title="Document signé" class="d-flex align-items-center" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned}">
                        <i class="fi fi-rr-memo-circle-check"></i> 
                        <span class="text-uppercase p-0 m-0 es-signrequest-workspace-title" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                    </span>
                    <span title="Document refusé" class="d-flex align-items-center"  th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused}">
                        <i class="fi fi-rr-document-circle-wrong"></i> 
                        <span class="text-uppercase p-0 m-0 es-signrequest-workspace-title" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                    </span>
                    <span title="Document supprimé" class="d-flex align-items-center"  th:if="${signRequestTab.deleted}"
                          th:classappend="${(signRequest.id == signRequestTab.id ? 'text-danger' : 'text-light')}">
                        <i class="fa-solid fa-stop-circle"></i> 
                        <span class="text-uppercase p-0 m-0 es-signrequest-workspace-title" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                    </span>
                    <span th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft}">
                        <i class="fa-solid fa-file"></i>
                        <span class="text-uppercase p-0 m-0 es-signrequest-workspace-title" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                    </span>
                </div>
            </a>
        </li>
    </th:block>
    <li class="nav-item dropdown d-none">
        <a class="nav-link dropdown-toggle" href="#" id="DropdownMenu" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" data-diplay="static">
            Suite des documents
        </a>
        <ul class="dropdown-menu p-2 dropdown-menu-right" aria-labelledby="DropdownMenu">
        </ul>
    </li>
</ul>
</html>
