<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="showSignRequest" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto"*/-->
<!--/*@thymesVar id="signRequestLight" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto.SignRequestLightDto"*/-->
<ul th:fragment="ws-tabs" id="ws-tabs" class="nav nav-tabs es-signrequest-workspace-header">
    <th:block th:each="signRequestTab, signRequestTabStat : ${showSignRequest.signRequestTabs}" th:if="${signRequestLight.id == signRequestTab.id}">
        <li class="nav-item ws-tab-nav">
            <a th:if="${signRequestTabStat.index > 0}"
               class="nav-link"
               th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${showSignRequest.signRequestTabs[signRequestTabStat.index - 1].id}"
               title="Document precedent">
                <i class="fi fi-rr-angle-small-left" style="font-size: 20px;"></i>
            </a>
            <span th:unless="${signRequestTabStat.index > 0}" class="nav-link disabled" title="Premier document">
                <i class="fi fi-rr-angle-small-left" style="font-size: 20px;"></i>
            </span>
        </li>
        <li class="nav-item ws-tab-nav">
            <span class="d-flex p-1 flex-column nav-link current align-items-center">
                <span class="text-uppercase text-dark d-none d-sm-flex" style="font-size: 10px">Document</span>
                <span class="text-uppercase" style="font-size: 13px"
                      th:text="(${signRequestTabStat.index + 1}) + '/' + (${#lists.size(showSignRequest.signRequestTabs)})"></span>
            </span>
        </li>
        <li class="nav-item ws-tab-nav">
            <a th:if="${signRequestTabStat.index + 1 < #lists.size(showSignRequest.signRequestTabs)}"
               class="nav-link"
               th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${showSignRequest.signRequestTabs[signRequestTabStat.index + 1].id}"
               title="Document suivant">
                <i class="fi fi-rr-angle-small-right" style="font-size: 20px;"></i>
            </a>
            <span th:unless="${signRequestTabStat.index + 1 < #lists.size(showSignRequest.signRequestTabs)}" class="nav-link disabled" title="Dernier document">
                <i class="fi fi-rr-angle-small-right" style="font-size: 20px;"></i>
            </span>
        </li>
    </th:block>
    <th:block th:each="signRequestTab : ${showSignRequest.signRequestTabs}">
        <li class="nav-item ws-tab file-tab d-none d-lg-flex" th:classappend="${signRequestLight.id == signRequestTab.id ? 'active' : ''}">
            <a tabindex="0" class="nav-link" th:classappend="${(signRequestLight.id == signRequestTab.id ? 'current alert-secondary' : '') + ' ' + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).checked ? 'bg-success-subtle text-dark' : '') + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || (signRequestTab.deleted || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused) ? 'bg-danger text-light' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending) ? 'bg-warning-subtle text-dark' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft) ? 'bg-secondary-subtle text-dark' : '')}"
               th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${signRequestTab.id}">
                    <th:block th:unless="${signRequestTab.deleted}">
                        <div class="d-flex justify-content-start align-items-center gap-1" >
                            <span class="d-flex" title="À signer" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending}">
                                <i class="fi fi-rr-memo" style="font-size: 18px;"></i>
                            </span>
                            <span class="d-flex" title="Document signé" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned}">
                                <i class="fi fi-rr-memo-circle-check"></i>
                            </span>
                            <span class="d-flex" title="Document refusé" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused}">
                                <i class="fi fi-rr-document-circle-wrong"></i>
                            </span>
                            <span th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft}">
                                <i class="fi fi-rr-document"></i>
                            </span>
                            <span class="text-uppercase truncate" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                            <span th:unless="${signRequestTab.viewedByCurrentUser}" class="d-flex badge badge-danger" th:classappend="${(signRequestLight.id == signRequestTab.id ? 'not-viewed' : '')}" title="Pour valider la lecture du document, il faut le faire défiler jusqu'à la dernière page">Non lu</span>
                        </div>
                    </th:block>
                    <span title="Document supprimé" class="d-flex align-items-center text-white"  th:if="${signRequestTab.deleted}">
                        <i class="fi fi-rr-trash"></i> 
                        <span class="text-uppercase p-0 m-0 es-signrequest-workspace-title" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                    </span>
            </a>
        </li>
    </th:block>
    <li class="nav-item dropdown d-none" th:if="${#lists.size(showSignRequest.signRequestTabs) > 1}">
        <a class="nav-link dropdown-toggle" href="#" id="DropdownMenu" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" data-diplay="static">
            Suite des documents
        </a>
        <ul class="dropdown-menu p-2 dropdown-menu-right" aria-labelledby="DropdownMenu">
        </ul>
    </li>
    <li class="nav-item ws-tab-nav d-none d-lg-block" style="border-bottom: 1px solid var(--bs-secondary-bg-subtle);">
        <a th:if="${showSignRequest.signBookLight.editable && showSignRequest.signRequestLight.createBy.eppn == userEppn}" title="Ajouter un document à signer" role="button" data-bs-toggle="modal" data-bs-target="#addDoc"  class="nav-link bg-secondary-subtle text-dark ">
            <div class="d-flex justify-content-start align-items-center gap-1">
                <i class="fi fi-rr-add-document"></i>
            </div>
        </a>
    </li>
</ul>
</html>
