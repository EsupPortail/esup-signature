<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="showSignRequest" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto"*/-->
<!--/*@thymesVar id="signRequestLight" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto.SignRequestLightDto"*/-->
<ul th:fragment="ws-tabs(tabsId)" th:id="${tabsId}" class="nav nav-tabs es-signrequest-workspace-header es-tabs-loading"
    th:with="currentTabIndex=${showSignRequest.currentSignRequestTabIndex != null ? showSignRequest.currentSignRequestTabIndex : 0}, signRequestTabCount=${showSignRequest.signRequestTabCount != null ? showSignRequest.signRequestTabCount : #lists.size(showSignRequest.signRequestTabs)}"
    th:attr="data-es-current-tab-index=${currentTabIndex},data-es-tab-count=${signRequestTabCount}">
    <th:block th:if="${showSignRequest.currentSignRequestTab != null}">
        <li class="nav-item ws-tab-nav">
            <a th:if="${showSignRequest.previousSignRequestTab != null}"
               class="nav-link"
               th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${showSignRequest.previousSignRequestTab.id}"
               title="Document precedent">
                <i class="fi fi-rr-angle-small-left" style="font-size: 20px;"></i>
            </a>
            <span th:unless="${showSignRequest.previousSignRequestTab != null}" class="nav-link disabled" title="Premier document">
                <i class="fi fi-rr-angle-small-left" style="font-size: 20px;"></i>
            </span>
        </li>
        <li class="nav-item ws-tab-nav">
            <span class="d-flex p-1 flex-column nav-link current align-items-center border-bottom">
                <span class="text-uppercase text-dark d-none d-sm-flex" style="font-size: 10px">Document</span>
                <span class="text-uppercase" style="font-size: 13px"
                      th:text="(${showSignRequest.currentSignRequestTabIndex + 1}) + '/' + (${showSignRequest.signRequestTabCount})"></span>
            </span>
        </li>
        <li class="nav-item ws-tab-nav">
            <a th:if="${showSignRequest.nextSignRequestTab != null}"
               class="nav-link"
               th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${showSignRequest.nextSignRequestTab.id}"
               title="Document suivant">
                <i class="fi fi-rr-angle-small-right" style="font-size: 20px;"></i>
            </a>
            <span th:unless="${showSignRequest.nextSignRequestTab != null}" class="nav-link disabled" title="Dernier document">
                <i class="fi fi-rr-angle-small-right" style="font-size: 20px;"></i>
            </span>
        </li>
    </th:block>
    <li class="nav-item dropdown es-signrequest-tabs-dropdown-before" th:classappend="${currentTabIndex == 0 ? 'd-none' : ''}" th:if="${signRequestTabCount > 1}">
        <a class="nav-link dropdown-toggle" href="#" th:id="${tabsId + '-dropdown-before'}" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" data-bs-display="static" title="Documents précédents">
            <span class="d-none d-sm-inline">Précédents</span>
            <i class="fi fi-rr-menu-dots d-sm-none" aria-hidden="true"></i>
        </a>
        <ul class="dropdown-menu p-2 es-signrequest-tabs-dropdown" th:attr="aria-labelledby=${tabsId + '-dropdown-before'}">
            <th:block th:each="signRequestTab, signRequestTabStat : ${showSignRequest.signRequestTabs}" th:if="${signRequestTabStat.index < currentTabIndex}">
                <li th:attr="data-es-tab-index=${signRequestTabStat.index}">
                    <a class="dropdown-item d-flex align-items-center gap-2"
                       th:classappend="${(signRequestLight.id == signRequestTab.id ? 'active' : '') + ' ' + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).checked ? 'bg-success-subtle text-dark' : '') + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || (signRequestTab.deleted || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused) ? 'bg-danger text-light' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending) ? 'bg-warning-subtle text-dark' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft) ? 'bg-secondary-subtle text-dark' : '')}"
                       th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${signRequestTab.id}">
                        <i th:unless="${signRequestTab.deleted}" th:class="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending ? 'fi fi-rr-memo' : (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused ? 'fi fi-rr-document-circle-wrong' : 'fi fi-rr-document')}"></i>
                        <i th:if="${signRequestTab.deleted}" class="fi fi-rr-trash"></i>
                        <span class="text-truncate" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                        <span th:unless="${signRequestTab.viewedByCurrentUser}" class="badge badge-danger ms-auto">Non lu</span>
                    </a>
                </li>
            </th:block>
        </ul>
    </li>
    <th:block th:each="signRequestTab, signRequestTabStat : ${showSignRequest.signRequestTabs}"
              th:if="${signRequestTabStat.index >= currentTabIndex - 50 && signRequestTabStat.index <= currentTabIndex + 50}">
        <li class="nav-item ws-tab file-tab d-none d-lg-flex"
            th:classappend="${signRequestLight.id == signRequestTab.id ? 'active' : 'es-tab-overflow-hidden'}"
            th:attr="data-es-tab-index=${signRequestTabStat.index}">
            <a tabindex="0" class="nav-link" th:classappend="${(signRequestLight.id == signRequestTab.id ? 'current alert-secondary' : '') + ' ' + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).checked ? 'bg-success-subtle text-dark' : '') + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || (signRequestTab.deleted || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused) ? 'bg-danger text-light' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending) ? 'bg-warning-subtle text-dark' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft) ? 'bg-secondary-subtle text-dark' : '')}"
               th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${signRequestTab.id}">
                    <th:block th:unless="${signRequestTab.deleted}">
                        <div class="d-flex justify-content-start align-items-center gap-1" >
                            <span class="d-flex" title="À signer" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending}">
                                <i class="fi fi-rr-memo" style="font-size: 18px;"></i>
                            </span>
                            <span class="d-flex" title="Document signé" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned}">
                                <i class="fi fi-rr-memo-circle-check"></i>
                            </span>
                            <span class="d-flex" title="Document refusé" th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused}">
                                <i class="fi fi-rr-document-circle-wrong"></i>
                            </span>
                            <span th:if="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft}">
                                <i class="fi fi-rr-document"></i>
                            </span>
                            <span class="text-uppercase truncate" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                            <span th:unless="${signRequestTab.viewedByCurrentUser}" class="d-flex badge badge-danger" th:classappend="${(signRequestLight.id == signRequestTab.id ? 'not-viewed' : '')}" title="Pour valider la lecture du document, il faut le faire défiler jusqu'à la dernière page">Non lu</span>
                        </div>
                    </th:block>
                    <span title="Document supprimé" class="d-flex align-items-center text-white"  th:if="${signRequestTab.deleted}">
                        <i class="fi fi-rr-trash"></i> 
                        <span class="text-uppercase p-0 m-0 es-signrequest-workspace-title" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                    </span>
            </a>
        </li>
    </th:block>
    <li class="nav-item dropdown es-signrequest-tabs-dropdown-after" th:classappend="${currentTabIndex + 1 >= signRequestTabCount ? 'd-none' : ''}" th:if="${signRequestTabCount > 1}">
        <a class="nav-link dropdown-toggle" href="#" th:id="${tabsId + '-dropdown-after'}" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" data-bs-display="static" title="Documents suivants">
            <span class="d-none d-sm-inline">Suivants</span>
            <i class="fi fi-rr-menu-dots d-sm-none" aria-hidden="true"></i>
        </a>
        <ul class="dropdown-menu dropdown-menu-end p-2 es-signrequest-tabs-dropdown" th:attr="aria-labelledby=${tabsId + '-dropdown-after'}">
            <th:block th:each="signRequestTab, signRequestTabStat : ${showSignRequest.signRequestTabs}" th:if="${signRequestTabStat.index >= currentTabIndex}">
                <li th:classappend="${signRequestTabStat.index > currentTabIndex ? '' : 'es-tab-overflow-hidden'}"
                    th:attr="data-es-tab-index=${signRequestTabStat.index}">
                    <a class="dropdown-item d-flex align-items-center gap-2"
                       th:classappend="${(signRequestLight.id == signRequestTab.id ? 'active' : '') + ' ' + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).checked ? 'bg-success-subtle text-dark' : '') + (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).signed || (signRequestTab.deleted || signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused) ? 'bg-danger text-light' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending) ? 'bg-warning-subtle text-dark' : '') + ((signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft) ? 'bg-secondary-subtle text-dark' : '')}"
                       th:href="${showSignRequest.urlProfil} + '/signrequests/' + ${signRequestTab.id}">
                        <i th:unless="${signRequestTab.deleted}" th:class="${signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending ? 'fi fi-rr-memo' : (signRequestTab.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused ? 'fi fi-rr-document-circle-wrong' : 'fi fi-rr-document')}"></i>
                        <i th:if="${signRequestTab.deleted}" class="fi fi-rr-trash"></i>
                        <span class="text-truncate" th:text="${signRequestTab.title}" th:title="${signRequestTab.title}"></span>
                        <span th:unless="${signRequestTab.viewedByCurrentUser}" class="badge badge-danger ms-auto">Non lu</span>
                    </a>
                </li>
            </th:block>
        </ul>
    </li>
    <li id="addDocTab" class="nav-item ws-tab-nav d-none d-lg-block">
        <a th:if="${showSignRequest.signBookLight.editable && showSignRequest.signRequestLight.createBy.eppn == userEppn}" title="Ajouter un document à signer" role="button" data-bs-toggle="modal" data-bs-target="#addDoc"  class="nav-link bg-light text-dark">
            <div class="d-flex justify-content-start align-items-center gap-1">
                <i class="fi fi-rr-add-document"></i>
            </div>
        </a>
    </li>
</ul>
</html>
