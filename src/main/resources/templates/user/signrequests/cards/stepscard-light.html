<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="showSignRequest" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto"*/-->
<!--/*@thymesVar id="signRequestFull" type="org.esupportail.esupsignature.dto.page.user.signrequest.SignRequestFullDto"*/-->
<!--/*@thymesVar id="signRequestLight" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto.SignRequestLightDto"*/-->
<div id="stepscard" th:fragment="stepscard-light">
    <div class="m-1">
        <th:block th:if="${showSignRequest.steps != null}">
            <div class="steps-vertical">
                <!-- Message si circuit non démarré -->
                <th:block th:if="${showSignRequest.steps.size() == 0}">
                    <div class="step-vertical">
                        <div class="step-vertical-content bg-light p-1 rounded">
                            <p class="text-muted">Le circuit n'est pas démarré</p>
                        </div>
                    </div>
                </th:block>

                <!-- Étapes du workflow -->
                <th:block th:each="liveWorkflowStep, iterator : ${showSignRequest.steps}">
                    <th:block th:with="stepNumber=${iterator.index + 1},
                                    isCompleted=${stepNumber lt signRequestFull.currentStepNumber},
                                    isCurrent=${stepNumber eq signRequestFull.currentStepNumber},
                                    isPending=${signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending},
                                    isRefused=${signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused},
                                    isDraft=${signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft},
                                    isWorkflowFinished=${showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed
                                        or showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported
                                        or showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned
                                        or showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived},
                                    isAutoSign=${liveWorkflowStep.autoSign}">

                        <div th:id="'liveStep-' + ${stepNumber}"
                            th:class="'step-vertical'
                                + ${(isCompleted or (isCurrent and not isPending and not isRefused and not isDraft)) ? ' complete' : ''}
                                + ${(isCompleted and isRefused) ? ' refused' : ''}
                                + ${(isCurrent and isPending and not isRefused and not isDraft) ? ' active' : ''}
                                + ${(isCurrent and isRefused) ? ' refused' : ''}">

                            <!-- Icône -->
                            <div class="step-vertical-icon">
                                <!-- Étape à venir -->
                                <th:block th:if="${stepNumber gt signRequestFull.currentStepNumber or isDraft}">
                                    <i th:class="${isAutoSign ? 'fi fi-rr-cloud-gear-automation' : 'fi fi-rr-pending'}"></i>
                                </th:block>

                                <!-- Étape en cours -->
                                <th:block th:if="${isCurrent}">
                                    <i th:if="${isPending}" class="fi fi-rr-duration-alt"></i>
                                    <i th:if="${isRefused}" class="fi fi-rr-cross-small"></i>
                                    <i th:if="${not isPending and not isRefused and not isDraft and not isWorkflowFinished and not isAutoSign}" class="fi fi-rr-attribution-pencil"></i>
                                    <i th:if="${not isPending and not isRefused and not isDraft and not isWorkflowFinished and isAutoSign}" class="fi fi-rr-cloud-gear-automation"></i>
                                </th:block>

                                <!-- Étape complétée -->
                                <th:block th:if="${isCompleted or (isCurrent and isWorkflowFinished)}">
                                    <i th:if="${not isRefused and not isAutoSign}" class="fi fi-rr-check"></i>
                                    <i th:if="${not isRefused and isAutoSign}" class="fi fi-rr-cloud-gear-automation"></i>
                                    <i th:if="${isRefused}" class="fi fi-rr-cross-small"></i>
                                </th:block>
                            </div>

                            <!-- Contenu simplifié -->
                            <div class="step-vertical-content bg-light p-1 rounded">
                                <div class="d-flex flex-column">
                                    <div class="d-flex justify-content-between">
                                        <b th:text="#{'signbook.signtype.' + ${liveWorkflowStep.signType}}"></b>

                                        <!-- Indicateurs -->
                                        <div class="step-indicators">
                                            <small th:if="${isAutoSign}" class="badge bg-info">Automatique</small>
                                            <span th:if="${liveWorkflowStep.recipients.size() > 1}" th:unless="${liveWorkflowStep.allSignToComplete}" title="Une signature suffit" class="step-indicator">
                                        <i class="fi fi-rr-users-slash"></i>
                                    </span>
                                            <span th:if="${liveWorkflowStep.allSignToComplete}" title="Tous les participants doivent signer" class="step-indicator">
                                        <i class="fa-solid fa-users"></i>
                                    </span>
                                            <span th:if="${liveWorkflowStep.repeatable}" title="Étape infinie" class="step-indicator">
                                        <i class="fi fi-rr-infinite-cycle"></i>
                                    </span>
                                        </div>
                                    </div>

                                    <!-- Description -->
                                    <th:block th:if="${liveWorkflowStep.description != null}">
                                        <p th:text="${liveWorkflowStep.description}"></p>
                                    </th:block>

                                    <!-- Liste simple des destinataires -->
                                    <th:block th:if="${not isAutoSign}">
                                        <table class="table table-sm table-hover table-borderless">
                                            <th:block th:each="recipient : ${liveWorkflowStep.recipients}" th:with="recipientAction=${showSignRequest.recipientActions.get(recipient.id)}">
                                                <tr>
                                                    <td>
                                                        <span th:if="${not #strings.isEmpty(recipient.user.firstname) and not #strings.isEmpty(recipient.user.name)}"
                                                            th:text="${recipient.user.firstname + ' ' + recipient.user.name}"
                                                            th:title="${recipient.user.email}"></span>
                                                        <span th:if="${#strings.isEmpty(recipient.user.firstname) and #strings.isEmpty(recipient.user.name)}"
                                                            th:text="${recipient.user.email}"
                                                            th:title="${recipient.user.email}"></span>
                                                        <br/>
                                                        <small th:if="${recipientAction != null && recipientAction.actionType.name() == 'signed'}"
                                                            th:text="'Le ' + ${#dates.format(recipientAction.date, 'dd/MM/YYYY HH:mm')}"></small>
                                                    </td>
                                                    <td class="text-end">
                                                        <i th:if="${recipientAction != null && recipientAction.actionType.name() == 'signed'}"
                                                            class="fa-solid fa-check-circle text-success"
                                                            th:title="|A signé le ${#dates.format(recipientAction.date, 'dd/MM/YYYY HH:mm')}|"></i>
                                                        <i th:if="${recipientAction != null && recipientAction.actionType.name() == 'none' && isPending}"
                                                            class="fa-solid fa-clock text-warning"
                                                            title="En attente de signature"></i>
                                                        <i th:if="${recipientAction != null && recipientAction.actionType.name() == 'none' && not isPending}"
                                                            class="fa-solid fa-minus-circle text-secondary"></i>
                                                        <i th:if="${recipientAction != null && recipientAction.actionType.name() == 'refused'}"
                                                            class="fa-solid fa-times-circle text-danger"
                                                            title="A refusé le document"></i>
                                                    </td>
                                                </tr>
                                            </th:block>
                                        </table>
                                    </th:block>
                                </div>
                            </div>
                        </div>
                    </th:block>
                </th:block>

                <!-- Fin de procédure (complétée) -->
                <th:block th:if="${showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed
                                or showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported
                                or showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned
                                or showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived}">
                    <div class="step-vertical complete signed">
                        <div class="step-vertical-icon">
                            <i class="fi fi-rr-flag"></i>
                        </div>
                        <div class="step-vertical-content bg-light">
                            <b>Procédure terminée</b>
                            <p th:if="${showSignRequest.workflow.sendAlertToAllRecipients}">
                                Les intervenants ont été informés par mail
                            </p>
                        </div>
                    </div>
                </th:block>

                <!-- Fin de procédure (refusée) -->
                <th:block th:if="${showSignRequest.signBookLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused}">
                    <div class="step-vertical complete refused">
                        <div class="step-vertical-icon">
                            <i class="fi fi-rr-triangle-warning"></i>
                        </div>
                        <div class="step-vertical-content bg-light">
                            <b>Procédure refusée</b>
                            <p th:if="${showSignRequest.workflow.sendAlertToAllRecipients}">
                                Les intervenants ont été informés par mail
                            </p>
                        </div>
                    </div>
                </th:block>
            </div>
        </th:block>

        <!-- Message si pas de workflow -->
        <th:block th:unless="${showSignRequest.steps != null}">
            <div class="alert alert-info" role="alert">
                Aucun circuit défini pour cette demande
            </div>
        </th:block>
    </div>
</div>
</html>
