<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="signRequest" type="org.esupportail.esupsignature.entity.SignRequest"*/-->
<div id="stepscard" th:fragment="stepscard" class="d-none d-lg-block">
    <div class="card text-bg-light m-2">
        <div class="card-header bg-transparent border-light-subtle p-0 pt-1">
            <h5 class="ms-4">Circuit</h5>
        </div>
        <div class="card-body">
            <th:block th:if="${signBook.liveWorkflow.liveWorkflowSteps != null}">
                <div id="admin-signrequest-stepscard" class="steps-vertical admin-signrequest-steps">
                    <th:block th:each="liveWorkflowStep, iterator : ${signBook.liveWorkflow.liveWorkflowSteps}">
                        <th:block th:with="stepNumber=${iterator.index + 1},
                                isCompleted=${stepNumber < signBook.liveWorkflow.currentStepNumber},
                                isCurrent=${stepNumber == signBook.liveWorkflow.currentStepNumber},
                                isFuture=${stepNumber > signBook.liveWorkflow.currentStepNumber},
                                isPending=${signRequest.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending},
                                isRefused=${signRequest.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused},
                                isDraft=${signRequest.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft},
                                isWorkflowFinished=${signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed
                                     || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported
                                     || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned
                                     || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived},
                                isVisa=${liveWorkflowStep.signType == T(org.esupportail.esupsignature.entity.enums.SignType).visa
                                     || liveWorkflowStep.signType == T(org.esupportail.esupsignature.entity.enums.SignType).hiddenVisa},
                                isAutoSign=${liveWorkflowStep.getAutoSign()}">

                            <div th:id="'liveStep-' + ${stepNumber}"
                                 th:class="'step-vertical'
                                     + ${(isCompleted  || (isCurrent  && !isPending  && !isRefused  && !isDraft)) ? ' complete' : ''}
                                     + ${(isCurrent  && isPending  && !isRefused  && !isDraft) ? ' active' : ''}
                                     + ${(isCurrent  && isRefused) ? ' refused' : ''}
                                     + ${((isFuture  || isDraft)  && !(isCurrent  && isPending)) ? ' div-disable' : ''}">

                                <div class="step-vertical-icon">
                                    <th:block th:if="${isFuture  || isDraft}">
                                        <i th:class="${isAutoSign ? 'fi fi-rr-cloud-gear-automation' : 'fi fi-rr-pending'}"></i>
                                    </th:block>

                                    <th:block th:if="${isCurrent}">
                                        <i th:if="${isPending}" class="fi fi-rr-duration-alt"></i>
                                        <i th:if="${isRefused}" class="fi fi-rr-cross-small"></i>
                                        <i th:if="${!isPending  && !isRefused  && !isDraft  && !isWorkflowFinished  && !isAutoSign}" class="fi fi-rr-attribution-pencil"></i>
                                        <i th:if="${!isPending  && !isRefused  && !isDraft  && !isWorkflowFinished  && isAutoSign}" class="fi fi-rr-cloud-gear-automation"></i>
                                    </th:block>

                                    <th:block th:if="${isCompleted  || (isCurrent  && isWorkflowFinished)}">
                                        <i th:if="${!isRefused  && isVisa}" class="fa-solid fa-check"></i>
                                        <i th:if="${!isRefused  && !isVisa}" class="fa-solid fa-signature"></i>
                                        <i th:if="${isRefused}" class="fi fi-rr-cross-small"></i>
                                    </th:block>
                                </div>

                                <div class="step-vertical-content bg-white p-2 rounded">
                                    <div class="d-flex justify-content-between align-items-start gap-2 mb-1">
                                        <b th:text="#{'signbook.signtype.' + ${liveWorkflowStep.signType}}"></b>
                                        <div class="d-flex align-items-center gap-2">
                                            <small th:if="${isAutoSign}" class="badge bg-info">Automatique</small>
                                            <span title="Tous les participants doivent signer" th:if="${liveWorkflowStep.allSignToComplete}" class="text-danger">
                                                <i class="fa-solid fa-users"></i>
                                            </span>
                                            <span title="Une signature suffit" th:unless="${liveWorkflowStep.allSignToComplete}">
                                                <i class="fa-solid fa-user"></i>
                                            </span>
                                        </div>
                                    </div>

                                    <table class="table table-sm table-hover table-borderless step-recipients">
                                        <th:block th:each="recipient : ${liveWorkflowStep.recipients}">
                                            <tr onmouseover="this.style.cursor = 'pointer'" th:onclick="'$(\'#menu-' + ${recipient.id} + '\').show();'">
                                                <td th:title="${recipient.user.email}" th:text="${recipient.user.firstname + ' ' + recipient.user.name}"></td>
                                                <td th:if="${(isFuture  || isCurrent)  && isPending}" th:switch="${recipient.signed}">
                                                    <i title="a signé le document" th:case="true" class="fa-solid fa-check-circle text-success"></i>
                                                    <i title="En attente de signature" th:case="false" class="fa-solid fa-clock text-warning"></i>
                                                </td>
                                                <td>
                                                    <button class="btn btn-sm"
                                                            title="Envoyer un nouveau lien d'accès"
                                                            th:onclick="'event.stopPropagation(); $(\'#menu-' + ${recipient.id} + '\').toggle();'"
                                                            th:if="${isManager  && recipient.user.userType.name() == 'external'  && isPending}">
                                                        <i class="fa-solid fa-key"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                            <div th:if="${isManager  && recipient.user.userType.name() == 'external'  && isPending}" data-bs-focus="false" class="modal" th:id="'menu-' + ${recipient.id}">
                                                <div class="modal-dialog">
                                                    <div class="modal-content">
                                                        <div class="modal-header"><h3>Envoyer un nouveau lien d’accès</h3></div>
                                                        <div class="modal-body">
                                                            <p>Confirmer l’envoi un nouveau lien d’accès</p>
                                                            <form th:action="'/user/signrequests/send-otp/' + ${signBook.id} + '/' + ${recipient.user.id}" method="post">
                                                                <th:block th:if="${globalProperties.smsRequired}">
                                                                    <label class="visually-hidden" th:for="'phone-' + ${recipient.id}">Numéro de mobile</label>
                                                                    <input type="text" name="phone" class="form-control" placeholder="Numéro de mobile" th:id="'phone-' + ${recipient.id}" th:value="${recipient.user.phone}">
                                                                </th:block>
                                                                <br>
                                                                <button type="submit" class="btn btn-success float-end mb-2" title="Envoyer un nouveau lien d'accès">Confirmer</button>
                                                            </form>
                                                            <button class="btn btn-secondary float-start" title="Fermer" th:onclick="'$(\'#menu-' + ${recipient.id} + '\').hide();'">Annuler</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </th:block>
                                    </table>
                                </div>
                            </div>
                        </th:block>
                    </th:block>

                    <th:block th:each="target : ${signBook.liveWorkflow.targets}">
                        <th:block th:with="canShowTarget=${signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported
                                 || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned
                                 || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived}">
                            <div class="step-vertical"
                                 th:title="${target.targetUri}"
                                 th:class="'step-vertical' + ${(target.targetOk  || canShowTarget) ? ' complete' : ' div-disable'}">
                                <div class="step-vertical-icon">
                                    <i class="fa-solid fa-file-export"></i>
                                </div>
                                <div class="step-vertical-content bg-light p-2 rounded text-break">
                                    <b>Export vers</b>
                                    <div th:text="${target.targetUri}"></div>
                                </div>
                            </div>
                        </th:block>
                    </th:block>

                    <th:block th:if="${signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).completed
                             || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).exported
                             || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).cleaned
                             || signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).archived}">
                        <div class="step-vertical complete signed">
                            <div class="step-vertical-icon">
                                <i class="fi fi-rr-flag"></i>
                            </div>
                            <div class="step-vertical-content bg-light p-2 rounded text-break">
                                <b>La procédure est terminée</b>
                                <div th:if="${signBook.liveWorkflow.workflow != null  && signBook.liveWorkflow.workflow.sendAlertToAllRecipients}">Les intervenants ont été informés par mail</div>
                            </div>
                        </div>
                    </th:block>

                    <th:block th:if="${signBook.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).refused}">
                        <div class="step-vertical complete refused">
                            <div class="step-vertical-icon">
                                <i class="fi fi-rr-triangle-warning"></i>
                            </div>
                            <div class="step-vertical-content bg-light p-2 rounded text-break">
                                <b>La procédure est terminée</b>
                                <div th:if="${signBook.liveWorkflow.workflow != null  && signBook.liveWorkflow.workflow.sendAlertToAllRecipients}">Les intervenants ont été informés par mail</div>
                            </div>
                        </div>
                    </th:block>
                </div>
            </th:block>
        </div>
    </div>
</div>
</html>
