<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:with="currentPage=#{label.tsls.summary}">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <ol id="breadcrumb-ol" class="breadcrumb">
                <li class="breadcrumb-item"><a href="/admin" class="d-flex align-items-center"><i class="fi fi-rr-chess-queen"></i> Administration</a></li>
                <li class="breadcrumb-item active"><a href="/admin/dss">Statut DSS</a></li>
                <li class="breadcrumb-item es-breadcrumb-title active" th:text="#{${'label.country.code.'+ tlInfo.parsingCacheInfo.territory}}" ></li>
            </ol>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content d-flex">
                <div class="es-sidebar d-flex">
                    <nav th:replace="~{fragments/sides/side-admin :: side-admin}"></nav>
                </div>
                <div class="flex-grow-1 overflow-auto">
                    <div class="p-0 m-2">
                        <div class="p-2">
                            <p th:if="${tlInfo == null}">No data found for this country</p>

                            <div th:if="${tlInfo != null}" th:with="status=${tlInfo.validationCacheInfo == null or tlInfo.validationCacheInfo.invalid or not tlInfo.downloadCacheInfo.resultExist} ? 'danger' :
                    (${(tlInfo.parsingCacheInfo != null and tlInfo.parsingCacheInfo.nextUpdateDate != null and tlInfo.parsingCacheInfo.nextUpdateDate <= #dates.createNow())
                    or (tlInfo.validationCacheInfo != null and tlInfo.validationCacheInfo.indeterminate)} ? 'warning' : 'success')"
                                 th:class="${'card border-' + status}">

                                <div th:class="${'card-header d-flex align-items-center flex-wrap gap-2 text-bg-' + status}">
                                    <th:block th:with="country = ${tlInfo.parsingCacheInfo != null and tlInfo.parsingCacheInfo.isResultExist()} ? ${tlInfo.parsingCacheInfo.territory} :
                            (${tlInfo.otherTSLPointer != null} ? ${tlInfo.otherTSLPointer.schemeTerritory} : 'no_country')">
                                        <span th:class="${'small_flag flag_' + country}" th:title="${country != 'no_country'} ? ${country} : '?'"></span>
                                        <span th:if="${country != 'no_country'}" th:text="#{${'label.country.code.'+country}}" class="tl-card-country-name"></span>
                                        <a class="link-light" th:if="${tlInfo.parsingCacheInfo.TSLType != null}" th:text="'(' + (${tlInfo.parsingCacheInfo.TSLType.label != null ? tlInfo.parsingCacheInfo.TSLType.label : tlInfo.parsingCacheInfo.TSLType.uri}) + ')'"
                                           th:href="${tlInfo.parsingCacheInfo.TSLType.uri}" target="_blank"></a>
                                    </th:block>
                                    <h3 th:if="${tlInfo.parsingCacheInfo == null}" class="card-title mb-0" th:text="Country Not Found"></h3>
                                    <span th:class="${'badge rounded-pill ms-auto bg-light text-dark'}" th:if="${tlInfo.parsingCacheInfo != null and tlInfo.parsingCacheInfo.trustServiceProviders != null}"
                                          th:text="${#lists.size(tlInfo.parsingCacheInfo.trustServiceProviders)}" title="Number of Trust Service Providers"></span>
                                </div>
                                <div class="card-body">
                                    <!-- TL-Info body -->
                                    <div th:replace="~{fragments/tl-info :: tl-info-body-content(url=${tlInfo.url},
                                downloadResult=${tlInfo.downloadCacheInfo},
                                parsingResult=${tlInfo.parsingCacheInfo},
                                validationResult=${tlInfo.validationCacheInfo},
                                potentialSigners=${tlInfo.validationCacheInfo.potentialSigners})}"></div>
                                    <div th:if="${tlInfo.parsingCacheInfo != null and not #lists.isEmpty(tlInfo.parsingCacheInfo.trustServiceProviders)}">
                                        <br>
                                        <th:block th:each="serviceProvider,sp : ${tlInfo.parsingCacheInfo.trustServiceProviders}">
                                            <div th:replace="~{fragments/tl-info :: tl-tsp(serviceProvider=${serviceProvider}, sp=${sp}, providersCollapsed=${true}, servicesCollapsed=${true})}"></div>
                                        </th:block>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
