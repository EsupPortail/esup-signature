<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="httpSessions" type="java.util.Map<org.esupportail.esupsignature.dto.page.admin.HttpSessionViewDto>"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<script type="module" th:src="'/js/modules/bootstrap/CurrentSessionsBootstrap.js?version=' + ${versionApp}"></script>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <ol id="breadcrumb-ol" class="breadcrumb">
                <li class="breadcrumb-item"><a href="/admin" class="d-flex align-items-center"><i class="fi fi-rr-chess-queen"></i> Administration</a></li>
                <li class="breadcrumb-item es-breadcrumb-title active">Sessions courantes</li>
            </ol>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content d-flex">
                <div class="es-sidebar d-flex">
                    <nav th:replace="~{fragments/sides/side-admin :: side-admin}"></nav>
                </div>
                <div class="es-table-list-layout flex-grow-1">
                    <div class="es-table-list-content p-0 m-2">
                        <div class="alert alert-light mb-2 d-flex flex-column">
                            <span th:text="${httpSessions.size()} + ' session(s) ouverte(s)'"></span>
                            <span th:text="${httpSessionsAlive.size()} + ' session(s) live'"></span>
                            <button id="toggleAnonymous" class="btn btn-sm btn-secondary">
                                <i class="fi fi-rr-eye-crossed"></i> Afficher les sessions anonymes
                            </button>

                        </div>
                        <div class="table-fix-head scrollbar-style rounded-3">
                            <table class="table table-hover table-responsive">
                                <thead class="table-secondary">
                                <tr>
                                    <th>EPPN</th>
                                    <th>Session ID</th>
                                    <th>Creation time</th>
                                    <th>Remote Ip</th>
                                    <th style="width: 300px;">Url d'origine</th>
                                    <th>Last access time</th>
                                    <th>Inactif depuis</th>
                                    <th>Alive</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody id="signRequestTable">
                                <tr th:each="httpSession : ${httpSessions}" th:class="${httpSession.userEppn == null && httpSession.originRequestUri != '/login/casentry'} ? 'table-secondary d-none' : ''" th:with="live=${((#dates.createNow().toInstant().toEpochMilli() - httpSession.lastRequest.toInstant().toEpochMilli()) / 1000 / 60) < 1}">
                                    <!--/*@thymesVar id="httpSession" type="org.springframework.session.MapSession"*/-->
                                    <td th:unless="${httpSession.userEppn == null}" th:classappend="${live} ? 'bg-success-subtle' : ''">
                                        <input type="text" th:value="${httpSession.userEppn}" disabled>
                                    </td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''" th:unless="${httpSession.userEppn != null}">Anonyme</td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''" th:text="${httpSession.sessionId}"></td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''" th:text="${#dates.format(httpSession.createdDate, 'dd/MM/yyyy HH:mm:ss')}"></td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''" th:text="${httpSession.remoteIp}"></td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''" th:text="${httpSession.originRequestUri}"></td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''" th:if="${httpSession.lastRequest != null}" th:text="${#dates.format(httpSession.lastRequest, 'dd/MM/yyyy HH:mm:ss')}"></td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''" th:if="${httpSession.lastRequest != null}"><span th:text="${(#dates.createNow().toInstant().toEpochMilli() - httpSession.lastRequest.toInstant().toEpochMilli()) / 1000 / 60 + ' mins'}"></span></td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''">
                                        <i th:class="${httpSession.expired} ? 'text-danger fi fi-rr-clock' : 'text-success fi fi-rr-check-circle'"></i>
                                    </td>
                                    <td th:classappend="${live} ? 'bg-success-subtle' : ''">
                                        <form th:action="'/admin/currentsessions'" th:method="'delete'"
                                              class="js-confirm-submit" data-confirm-message="Attention, cette action va déconnecter l’utilisateur.">
                                            <input type="hidden" name="sessionId" th:value="${httpSession.sessionId}"/>
                                            <button type="submit" class="btn btn-sm btn-danger">
                                                <i class="fi fi-rr-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
