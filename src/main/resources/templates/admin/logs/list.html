<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="logs" type="java.util.List<org.esupportail.esupsignature.entity.Log>"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <ol id="breadcrumb-ol" class="breadcrumb">
                <li class="breadcrumb-item"><a href="/admin" class="d-flex align-items-center"><i class="fi fi-rr-chess-queen"></i> Administration</a></li>
                <li class="breadcrumb-item es-breadcrumb-title active">Logs</li>
            </ol>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content d-flex">
                <div class="es-sidebar d-flex">
                    <nav th:replace="~{fragments/sides/side-admin :: side-admin}"></nav>
                </div>
                <div class="es-table-list-layout flex-grow-1">
                    <div class="es-table-list-content p-0 m-2">
                        <div class="table-fix-head scrollbar-style rounded-3">
                            <table class="table table-light table-borderless table-hover">
                                <thead class="table-secondary">
                                <tr>
                                    <th>Date</th>
                                    <th>Id</th>
                                    <th>Titre</th>
                                    <th>Circuit</th>
                                    <th>Eppn</th>
                                    <th>Action</th>
                                    <th>Statut initial</th>
                                    <th>Statut final</th>
                                </tr>
                                </thead>
                                <tbody>
                                <th:block th:each="log : ${logs}">
                                    <tr>
                                        <td><span th:text="${#dates.format(log.logDate, 'dd/MM/yyyy HH:mm')}"></span></td>
                                        <td><input type="text" th:value="${log.signRequestId}" disabled /></td>
                                        <td><span th:text="${log.subject}"></span></td>
                                        <td><span th:text="${log.workflowName}"></span></td>
                                        <td><span th:text="${log.eppn}"></span></td>
                                        <td><span th:text="${log.action}"></span></td>
                                        <td><span th:text="#{'signbook.status.' + ${log.initialStatus}}"></span></td>
                                        <td><span th:text="#{'signbook.status.' + ${log.finalStatus}}"></span></td>
                                    </tr>
                                </th:block>
                                </tbody>
                            </table>
                            <nav th:replace="~{fragments/pagination :: pagination}"></nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
