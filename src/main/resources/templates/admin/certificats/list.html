<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="certificats" type="java.util.List<org.esupportail.esupsignature.entity.Certificat>"*/-->
<!--/*@thymesVar id="sealCertificatPropertieses" type="java.util.ArrayList<org.esupportail.esupsignature.config.certificat.SealCertificatProperties>"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <ol id="breadcrumb-ol" class="breadcrumb">
                <li class="breadcrumb-item"><a href="/admin" class="d-flex align-items-center"><i class="fi fi-rr-chess-queen"></i> Administration</a></li>
                <li class="breadcrumb-item active">Certificats</li>
            </ol>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content d-flex">
                <div class="es-sidebar d-flex">
                    <nav th:replace="~{fragments/sides/side-admin :: side-admin}"></nav>
                </div>
                <div class="flex-grow-1">
                    <div class="p-0 m-2 d-flex flex-column gap-2">
                        <div class="alert alert-light" th:if="${sealCertificatPropertieses != null && !sealCertificatPropertieses.isEmpty()}">
                                <h5 class="text-center"><b>Certificat cachet</b></h5>
                                <table class="table table-sm table-hover">
                                    <thead class="table-secondary">
                                    <tr>
                                        <th>Nom</th>
                                        <th>Secours de</th>
                                        <th>Titre</th>
                                        <th>Certificat</th>
                                        <th>Rôles</th>
                                        <th>Date de création</th>
                                        <th>Date de fin</th>
                                        <th class="text-center">Validité eIDas</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <th:block th:each="sealCertificatProperties : ${sealCertificatPropertieses}">
                                        <tr>
                                            <td th:text="${sealCertificatProperties.sealCertificatName}"></td>
                                            <td th:text="${sealCertificatProperties.sealSpareOf}"></td>
                                            <td th:text="${sealCertificatProperties.sealCertificatTitle}"></td>
                                            <td style="width: 600px; word-break: break-all" th:text="${sealCertificatProperties.dssPrivateKeyEntry.certificate.subject.principal}"></td>
                                            <td th:text="${sealCertificatProperties.roles}"></td>
                                            <td th:text="${#dates.format(sealCertificatProperties.dssPrivateKeyEntry.certificate.creationDate, 'dd/MM/yyyy HH:mm')}"></td>
                                            <td>
                                                <i th:if="${sealCertificatProperties.dssPrivateKeyEntry.certificate.notAfter.after(#dates.createNow())}" class="fa-solid fa-check text-success fa-2x"></i>
                                                <i th:unless="${sealCertificatProperties.dssPrivateKeyEntry.certificate.notAfter.after(#dates.createNow())}" class="fi fi-rr-cross text-danger fa-2x"></i>
                                                <span th:text="${#dates.format(sealCertificatProperties.dssPrivateKeyEntry.certificate.notAfter, 'dd/MM/yyyy HH:mm')}"></span>
                                            </td>
                                            <td class="text-center">
                                                <i th:if="${sealCertificatProperties.eIDasValidity}" class="fa-solid fa-check text-success fa-2x"></i>
                                                <i th:unless="${sealCertificatProperties.eIDasValidity}" class="fi fi-rr-cross text-danger fa-2x"></i>
                                            </td>
                                        </tr>
                                    </th:block>
                                    </tbody>
                                </table>
                        </div>
                        <div class="alert alert-light">
                                <h5 class="text-center"><b>Certificats pour les rôles</b></h5>
                                <table class="table table-sm table-hover">
                                    <thead class="table-secondary">
                                    <tr>
                                        <th>Nom</th>
                                        <th>Date de création</th>
                                        <th>Date de fin</th>
                                        <th>Roles</th>
                                        <th>Actions</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <th:block th:each="certificat : ${certificats}">
                                        <tr>
                                            <td style="width: 600px; word-break: break-all" th:text="${certificat.keystore.fileName}"></td>
                                            <td th:text="${#dates.format(certificat.createDate, 'dd/MM/yyyy HH:mm')}"></td>
                                            <td th:text="${#dates.format(certificat.expireDate, 'dd/MM/yyyy HH:mm')}"></td>
                                            <td th:text="${certificat.roles}"></td>
                                            <td>
                                                <a class="btn btn-danger" th:href="'#modal-warning-' + ${certificat.id}" role="button" title="Supprimer"
                                                   data-bs-toggle="modal" th:data-bs-target="'#modal-warning-' + ${certificat.id}">
                                                    <i class="fi fi-rr-trash"></i>
                                                </a>
                                                <div data-bs-focus="false" class="modal modal-warning fade in" th:id="'modal-warning-' + ${certificat.id}">
                                                    <div class="modal-dialog">
                                                        <div class="modal-content">
                                                            <form th:action="'/admin/certificats'" th:method="delete">
                                                                <input type="hidden" name="id" th:value="${certificat.id}">
                                                                <div class="modal-header">
                                                                    <h2>Attention</h2>
                                                                    <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close"></button>
                                                                </div>
                                                                <div class="modal-body">
                                                                    <div class="alert alert-danger">Confirmez-vous la suppression de ce certificat ?</div>
                                                                </div>
                                                                <div class="modal-footer">
                                                                    <button type="button" class="btn btn-secondary float-start" data-bs-dismiss="modal">Non</button>
                                                                    <button type="submit" class="btn btn-danger">Oui</button>
                                                                </div>
                                                            </form>
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                    </th:block>
                                    </tbody>
                                </table>
                        </div>
                    </div>
                </div>
                <div class="es-sign-buttons es-fixed-action-btns active">
                    <ul class="list-unstyled">
                        <li id="refreshButton">
                            <a title="Rafraichir les certificats" href="/admin/certificats/refresh" class="btn btn-transparent text-dark"><i class="fi fi-rr-refresh"></i></a>
                        </li>
                        <li id="addButton">
                            <a title="Ajouter un certificat" data-bs-toggle="modal" data-bs-target="#newCertificat" class="btn btn-transparent text-dark">
                                <i class="fi fi-rr-plus"></i>
                            </a>
                        </li>
                    </div>
                </div>
            </div>
                    </ul>
                </div>
        </div>
    </div>
</div>
</div>

    <div data-bs-focus="false" class="modal fade" id="newCertificat"  role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-xl" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Ajouter un certificat</h5>
                    <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close">

                    </button>
                </div>
                <form id="addCertificat" th:action="'/admin/certificats?' + ${_csrf.parameterName} + '=' + ${_csrf.token}" method="post" enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="form-group mb-3">
                            <label class="col-form-label">Keystore au format PKCS12</label>
                            <div class="custom-file">
                                <input aria-describedby="inputGroupFileAddon01" class="form-control"
                                       data-buttonText="Choisir fichier" id="keystore" name="keystore"
                                       type="file" required/>
                                <label class="custom-file-label" for="keystore" id="inputGroupLabel01">
                                    Choisir un fichier
                                </label>
                            </div>
                        </div>
                        <div class="form-group mb-3">
                            <label for="roleNames" class="col-form-label">Nom du role autorisé utiliser ce certificat</label>
                            <select id="roleNames" class="form-select" type="text" name="roleNames" multiple>
                                <th:block th:each="newRole : ${roles}">
                                    <option th:text="${newRole}" th:value="${newRole}"></option>
                                </th:block>
                            </select>
                        </div>
                        <div class="form-group mb-3">
                            <label for="password" class="col-form-label">Mot de passe du keystore</label>
                            <input id="password" class="form-control" type="password" name="password">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <input type="submit" class="btn btn-success" value="Valider">
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
