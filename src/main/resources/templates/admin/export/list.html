<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="forms" type="java.util.List<org.esupportail.esupsignature.entity.Form>"*/-->
<!--/*@thymesVar id="workflows" type="java.util.List<org.esupportail.esupsignature.entity.Workflow>"*/-->
<head th:replace="~{fragments/head :: head}"></head>
<body>
<header th:replace="~{fragments/nav :: nav}"></header>
<main role="main">
    <div class="es-wrapper">
        <nav id="breadcrumb" aria-label="breadcrumb" class="es-breadcrumb-nav es-breadcrumb-nav-full-fixed es-breadcrumb-nav-full text-uppercase">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/admin" class="d-flex align-items-center"><i class="fi fi-rr-chess-queen"></i> Administration</a></li>
                <li class="breadcrumb-item es-breadcrumb-title active">Export des données des formulaires</li>
            </ol>
        </nav>
        <div id="content" class="es-content-full">
            <div class="es-main-content d-flex">
                <div class="es-sidebar d-flex">
                    <nav th:replace="~{fragments/sides/side-admin :: side-admin}"></nav>
                </div>
                <div class="flex-grow-1">
                    <div class="p-0 m-2">
                        <div class="alert alert-light">
                            <div class="alert alert-secondary">
                                Ici, vous pouvez télécharger un fichier CSV comportant toutes données saisies dans les formulaires
                            </div>
                                <ul>
                                    <th:block th:each="form : ${forms}">
                                        <li>
                                            <a th:href="'/admin/export/form/' + ${form.name} + '/datas/csv'" th:text="'Export ' + ${form.title}" download></a>
                                            (<a th:href="'/admin/export/form/' + ${form.name} + '/datas/json'" target="_blank">json</a>)
                                        </li>
                                    </th:block>
                                </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
