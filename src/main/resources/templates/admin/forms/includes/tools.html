<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="globalProperties" type="org.esupportail.esupsignature.config.GlobalProperties"*/-->
<!--/*@thymesVar id="form" type="org.esupportail.esupsignature.entity.Form"*/-->
<div th:fragment="tools" id="tools" class="tools tools-admin" th:if="${document != null}">
	<div class="d-flex mb-1" th:if="${workflow != null}">
		<th:block th:if="${document.contentType == 'application/pdf'}">
			<button id="zoomout" title="Zoom arrière" class="d-flex align-items-center btn btn-light btn-outline-dark me-1"><i
					class="fi fi-rr-zoom-out"></i></button>
			<button id="zoomin" title="Zoom avant" class="d-flex align-items-center btn btn-light btn-outline-dark me-1"><i
					class="fi fi-rr-zoom-in"></i></button>
			<button id="fullwidth" title="Pleine largeur" class="d-flex align-items-center btn btn-light btn-outline-dark me-1 d-none d-sm-flex"><i
					class="fi fi-rr-expand-arrows"></i></button>
			<button id="fullheight" title="Pleine hauteur" class="d-flex align-items-center btn btn-light btn-outline-dark me-1 d-none d-sm-flex"><i
					class="fi fi-rr-compress-alt"></i></button>
			<div class="zoom bg-light me-1 p-1 pt-2 d-none d-xxl-inline fw-bold"><span id="zoom"></span> %</div>
			<div class="border ms-1 me-2 d-none d-lg-block"></div>
			<button id="prev" title="Page précédente" class="d-flex align-items-center btn btn-light btn-outline-dark me-1 d-none d-sm-flex" aria-label="Précédent">
				<i class="fi fi-rr-up"></i>
			</button>
			<div class="bg-light me-1 p-1 pt-2 d-none d-xxxl-inline-flex fw-bold" style="min-width: 150px;">
				<span>Page </span><input type="text" id="page_num" class="form-control fw-bold form-control-xs ms-1" style="width: 50px;"/><span> / </span> <span id="page_count"></span>
			</div>
			<button id="next" title="Page suivante" class="d-flex align-items-center btn btn-light btn-outline-dark me-1 d-none d-sm-flex" aria-label="Prochain">
				<i class="fi fi-rr-down"></i>
			</button>
			<th:block th:if="${document.contentType == 'application/pdf' && form.workflow != null}">
				<div class="border ms-3 me-3 d-none d-lg-block"></div>

				<button id="addSpotButton"
						th:title="${form.workflow.workflowSteps.size() > srpMap.entrySet().size()} ? 'Ajouter un emplacement de signature' : 'Plus d`emplacement disponible'"
						class="btn btn-warning" th:disabled="${form.workflow.workflowSteps.size() <= srpMap.entrySet().size()}">
					<i class="fi fi-rr-digital-signature"></i> Ajouter un emplacement de signature
				</button>
			</th:block>
		</th:block>
	</div>
</div>
</html>
