<html th:remove="tag" lang="fr" xmlns:th="http://www.thymeleaf.org">
<th:block th:each="signBook : ${signBooks}">
    <tr th:if="${statusFilter != 'empty' && signBook.primarySignRequest != null}" th:with="signRequest = ${signBook.primarySignRequest}" th:data-href="'/admin/signbooks/' + ${signBook.id}" data-bs-toggle="tooltip" th:title="${signBook.description}">
        <td class="w-20 d-none d-lg-table-cell">
            <input type="checkbox" autocomplete="off" class="form-check-input sign-requests-ids" name="ids[]"
                th:value="${signRequest.id}" th:data-es-signrequest-status="${signRequest.status}"
                th:data-es-sign-type="${signBook.currentSignType}"
                th:data-es-signbook-id="${signBook.id}">
        </td>
        <td class="clickable-td text-break d-none d-xxl-table-cell overflow-hidden" th:data-href="'/admin/signrequests/' + ${signRequest.id}" th:text="${signBook.workflowName}"></td>
        <td class="clickable-td text-break overflow-hidden" style="white-space: pre-line" th:text="${signBook.subject}"></td>
        <td class="clickable-td d-none d-xxl-table-cell" th:text="${signBook.createByDisplayName}"></td>
        <td class="clickable-td d-none d-xl-table-cell"><span th:text="${signRequest.createDateLabel}"></span>
        </td>
        <td class="d-none d-xl-table-cell">
            <div th:if="${signBook.hasParticipants()}">
                <div class="dropdown">
                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" th:id="'dropdownMenuButton-' + ${signBook.id}" data-bs-toggle="dropdown">
                        <i class="fa-solid fa-list"></i> Liste des participants
                    </button>
                    <ul class="dropdown-menu" th:aria-labelledby="'dropdownMenuButton-' + ${signBook.id}">
                        <th:block th:each="participantStep : ${signBook.participantSteps}">
                            <th:block th:each="recipient : ${participantStep.recipients}">
                                <li class="dropdown-item" th:title="${recipient.email}" style="display: inline-flex;">
                                    <span class="badge rounded-pill rounded-5 text-bg-primary" th:text="${participantStep.stepNumber}" style="font-size: 13px; line-height: 12px;"></span>&nbsp;
                                    <span class="me-1" th:text="${recipient.displayName}"></span>
                                    <i th:if="${recipient.statusIconClass != null}" th:title="${recipient.statusTitle}" th:class="${recipient.statusIconClass}"></i>
                                </li>
                            </th:block>
                        </th:block>
                    </ul>
                </div>
            </div>
        </td>
        <td class="clickable-td d-none d-xxxl-table-cell">
            <span th:if="${signBook.endDateLabel != null}" th:text="${signBook.endDateLabel}"></span>
            <br th:if="${signBook.deletedDateLabel != null || signBook.lastSignedDocumentDateLabel != null}">
            <span th:if="${signBook.deletedDateLabel != null}" th:text="${signBook.deletedDateLabel}"></span>
            <span th:if="${signBook.lastSignedDocumentDateLabel != null}" th:text="${signBook.lastSignedDocumentDateLabel}"></span>
        </td>
        <td class="clickable-td d-none d-md-table-cell"
            style="width: 150px;">
            <div th:if="${!signBook.deleted}" th:switch="${signBook.status}" class="text-center mb-1 mt-1">
                <div th:case="'uploading'" class="badge rounded-pill badge-status bg-secondary" th:title="#{'signbook.status.' + ${signBook.status}}">
                    <i class="fi fi-rr-cloud-upload-alt" th:title="#{'signbook.status.' + ${signBook.status}}"></i>
                    <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${signBook.status}}"></span>
                </div>
                <div th:case="'refused'" class="badge rounded-pill badge-status bg-danger" th:title="${signBook.refusedCommentTitle}">
                    <i class="fi fi-rr-cross-circle"></i>
                    <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${signBook.status}}"></span>
                </div>
                <div th:case="*">
                    <div class="badge rounded-pill badge-status" th:classappend="'text-bg-' + #{'signbook.status.color.' + ${signBook.status}}" th:title="#{'signbook.status.' + ${signBook.status}}">
                        <i class="fi" th:classappend="#{'signbook.status.icon.' + ${signBook.status}}" th:title="#{'signbook.status.' + ${signBook.status}}"></i>
                        <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${signBook.status}}"></span>
                    </div>
                </div>
            </div>
            <div th:if="${signBook.deleted}" class="text-center mb-1 mt-1">
                <div class="badge rounded-pill badge-status bg-danger" th:title="'Avant suppression : ' + #{'signbook.status.' + ${signBook.status}}">
                    <i class="fi fi-rr-trash"></i>
                    <span class="d-md-inline-flex">Supprimé</span>
                </div>
            </div>
        </td>
        <td class="clickable-td d-none d-xxl-table-cell align-middle" th:title="#{'signbook.archivestatus.' + ${signBook.archiveStatus}}">
            <span th:if="${signBook.archiveStatus != null && signBook.archiveStatus != 'none'}">
                <i class="fi fi-rr-box" th:classappend="${signBook.archiveStatus == 'archived'} ? 'text-dark' : 'text-secondary'"></i>
            </span>
        </td>
        <td>
            <div class="dropdown position-relative">
                <button type="button" th:id="'menu-toggle_' + ${signBook.id}" class="btn text-dark" th:title="'Actions ' + ${signRequest.title}" th:data-bs-target="'#menu-' + ${signBook.id}" th:aria-controls="'menu-' + ${signBook.id}" data-bs-toggle="dropdown">
                    <i class="fa-solid fa-ellipsis-v"></i>
                </button>
                <ul class="dropdown-menu position-absolute ps-2 pe-2" th:id="'menu-' + ${signBook.id}">
                    <li>
                        <a th:unless="${signRequest.status == 'pending' && statusFilter == 'toSign'}" class="btn btn-transparent text-dark text-left col-12" title="Consulter" role="button" th:href="'/admin/signrequests/' + ${signRequest.id}">
                            <i class="fa-solid fa-eye pr-2"></i> Consulter
                        </a>
                    </li>
                    <li>
                        <a th:if="${signRequest.deleted && signBook.createByEppn == userEppn}" class="btn btn-transparent text-dark text-left col-12" th:href="'/admin/signbooks/restore/' + ${signBook.id}" role="button" title="Restaurer">
                            <i class="fa-solid fa-trash-restore pr-2"></i> Restaurer
                        </a>
                    </li>
                    <li>
                        <a class="btn btn-transparent text-dark text-left col-12" th:href="'#modal-warning-' + ${signBook.id}" role="button" title="Supprimer" data-bs-toggle="modal" th:data-bs-target="'#modal-warning-' + ${signBook.id}">
                            <i class="fa-solid fa-trash-alt text-danger pr-2"></i> <span th:text="${!signRequest.deleted ? 'Mettre à la corbeille' : 'Supprimer de la corbeille'}"></span>
                        </a>
                    </li>
                </ul>
            </div>
            <div data-bs-focus="false" class="modal modal-warning fade in" th:id="'modal-warning-' + ${signBook.id}">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:id="'signBookDel' + ${signBook.id}" th:action="'/admin/signbooks/'+ ${signBook.id}" th:method="delete">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="modal-header">
                                <h2>Attention</h2>
                                <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close">

                                </button>
                            </div>
                            <div class="modal-body">
                                <div class="alert alert-danger">Confirmez-vous la suppression de cette demande ?</div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary float-start" data-bs-dismiss="modal">Non</button>
                                <button type="submit" class="btn btn-danger">Oui</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </td>
    </tr>
    <tr th:if="${statusFilter == 'empty'}" th:title="${signBook.subject}">
        <td></td>
        <td class="clickable-td text-break d-none d-xxl-table-cell" th:text="${signBook.subject}">
        </td>
        <td class="clickable-td text-break">
            Ne contient aucun document
        </td>
        <td></td>
        <td></td>
        <td class="d-none d-xl-table-cell">
            <div th:if="${signBook.hasParticipants()}">
                <div class="dropdown">
                    <button class="btn btn-sm btn-light btn-outline-light dropdown-toggle" type="button" th:id="'dropdownMenuButton-' + ${signBook.id}" data-bs-toggle="dropdown">
                        <i class="fa-solid fa-users"></i> Liste des participants
                    </button>
                    <ul class="dropdown-menu" th:aria-labelledby="'dropdownMenuButton-' + ${signBook.id}">
                        <th:block th:each="participantStep : ${signBook.participantSteps}">
                            <th:block th:each="recipient : ${participantStep.recipients}">
                                <li class="dropdown-item" th:title="${recipient.email}" style="display: inline-flex;">
                                    <span class="me-1" style="word-break: break-all" th:text="${recipient.displayName}"></span>
                                    <i th:if="${recipient.statusIconClass != null}" th:title="${recipient.statusTitle}" th:class="${recipient.statusIconClass}"></i>
                                </li>
                            </th:block>
                        </th:block>
                    </ul>
                </div>
            </div>
        </td>
        <td></td>
        <td class="d-none d-md-table-cell"
            style="width: 150px;">
            <div th:if="${!signBook.deleted}" th:switch="${signBook.status}" class="text-center mb-1 mt-1">
                <div th:case="'uploading'" class="badge rounded-pill badge-status bg-secondary" th:title="#{'signbook.status.' + ${signBook.status}}">
                    <i class="fi fi-rr-cloud-upload-alt" th:title="#{'signbook.status.' + ${signBook.status}}"></i>
                    <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${signBook.status}}"></span>
                </div>
                <div th:case="'refused'" class="badge rounded-pill badge-status bg-danger" th:title="${signBook.refusedCommentTitle}">
                    <i class="fi fi-rr-cross-circle"></i>
                    <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${signBook.status}}"></span>
                </div>
                <div th:case="*">
                    <div class="badge rounded-pill badge-status" th:classappend="'text-bg-' + #{'signbook.status.color.' + ${signBook.status}}" th:title="#{'signbook.status.' + ${signBook.status}}">
                        <i class="fi" th:classappend="#{'signbook.status.icon.' + ${signBook.status}}" th:title="#{'signbook.status.' + ${signBook.status}}"></i>
                        <span class="d-md-inline-flex" th:text="#{'signbook.status.' + ${signBook.status}}"></span>
                    </div>
                </div>
            </div>
            <div th:if="${signBook.deleted}" class="text-center mb-1 mt-1">
                <div class="badge rounded-pill badge-status bg-danger" th:title="'Avant suppression : ' + #{'signbook.status.' + ${signBook.status}}">
                    <i class="fi fi-rr-trash"></i>
                    <span class="d-md-inline-flex">Supprimé</span>
                </div>
            </div>
        </td>
        <td class="clickable-td d-none d-xxl-table-cell align-middle" th:title="#{'signbook.archivestatus.' + ${signBook.archiveStatus}}">
            <span th:if="${signBook.archiveStatus != null && signBook.archiveStatus != 'none'}">
                <i class="fi fi-rr-box" th:classappend="${signBook.archiveStatus == 'archived'} ? 'text-dark' : 'text-secondary'"></i>
            </span>
        </td>
        <td>
            <div class="dropdown position-relative">
                <button type="button" th:id="'menu-toggle_' + ${signBook.id}" class="btn text-dark" th:title="'Actions ' + ${signBook.subject}" th:data-bs-target="'#menu-' + ${signBook.id}" th:aria-controls="'menu-' + ${signBook.id}" data-bs-toggle="dropdown">
                    <i class="fa-solid fa-ellipsis-v"></i>
                </button>
                <ul class="dropdown-menu position-absolute ps-2 pe-2" th:id="'menu-' + ${signBook.id}">
                    <li>
                        <a th:if="${signBook.createByEppn == userEppn}" class="btn btn-transparent text-dark text-left col-12" th:href="'#modal-warning-' + ${signBook.id}" role="button" title="Supprimer" data-bs-toggle="modal" th:data-bs-target="'#modal-warning-' + ${signBook.id}">
                            <i class="fa-solid fa-trash-alt pr-2"></i> <span th:text="${!signBook.deleted ? 'Mettre à la corbeille' : 'Supprimer de la corbeille'}"></span>
                        </a>
                    </li>
                </ul>
            </div>
            <div data-bs-focus="false" class="modal modal-warning fade in" th:id="'modal-warning-' + ${signBook.id}">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:id="'signBookDel' + ${signBook.id}" th:action="'/admin/signbooks/force-delete/'+ ${signBook.id}" th:method="delete">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="modal-header">
                                <h2>Attention</h2>
                                <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="alert alert-danger">Confirmez-vous la suppression de cette demande ?</div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary float-start" data-bs-dismiss="modal">Non</button>
                                <button type="submit" class="btn btn-danger">Oui</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </td>
    </tr>
</th:block>
</html>
