<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="securityServices" type="java.util.List<org.esupportail.esupsignature.service.security.SecurityService>"*/-->
<head th:replace="~{fragments/head-full :: head}"></head>
<body>
<header th:replace="~{fragments/nav-empty :: nav-empty}"></header>
<main role="main">
    <div class="es-wrapper">
        <div id="content" class="es-content-full">
            <div class="es-auth-page">
                <div class="alert alert-light es-auth-card">
                    <div class="d-none" th:if="${#authorization.expression('isAuthenticated()')}">
                        <span th:if="${auth != null}" th:text="${auth}"></span>
                    </div>
                    <div th:if="${#authorization.expression('isAnonymous()')}">

                        <div class="es-auth-illustration es-auth-illustration--login"></div>

                        <h4>Connexion à ESUP-Signature</h4>

                        <p class="es-auth-description">
                            Choisissez votre mode de connexion pour accéder à vos documents et à vos demandes de signature.
                        </p>

                        <form id="captchaForm" class="signin-captcha-form" action="" th:if="${globalProperties.enableCaptcha}">
                            <label class="form-label" for="captchaInput">Vérification anti-robot</label>
                            <div class="signin-captcha-controls">
                                <input id="captchaInput" class="jCaptcha form-control" type="text" placeholder="Entrez le résultat">
                                <button class="btn btn-outline-secondary" id="captchaButton" type="submit">Je ne suis pas un robot</button>
                            </div>
                        </form>

                        <div th:class="${globalProperties.enableCaptcha} ? 'd-none' : ''" id="loginBlock">
                            <div class="signin-login-list">
                                <th:block th:each="securityConfig : ${securityServices}">
                                    <button th:if="${securityConfig.title != 'FranceConnect'}"
                                            type="button"
                                            th:data-url="${securityConfig.loginUrl} + '?redirect=' + ${redirect}"
                                            onclick="location.href=this.getAttribute('data-url')"
                                            class="es-auth-button"
                                            th:text="${securityConfig.title}">
                                    </button>
                                </th:block>
                            </div>

                            <div class="es-auth-panel es-auth-panel--primary" th:if="${!securityServices.isEmpty()}">
                                <p>Sélectionnez la méthode adaptée à votre profil pour poursuivre la connexion.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/message :: message}"></div>
<footer th:replace="~{fragments/footer-light :: footer}"></footer>
<script th:if="${globalProperties.enableCaptcha}">
    $(function() {
        const captchaFillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bs-dark').trim();
        let myCaptcha = new jCaptcha({
            el: '.jCaptcha',
            canvasClass: 'jCaptchaCanvas',
            canvasStyle: {
                // required properties for captcha stylings:
                width: 150,
                height: 15,
                textBaseline: 'top',
                font: '15px Arial',
                textAlign: 'left',
                fillStyle: captchaFillStyle
            },
            // set callback function for success  && error messages:
            callback: ( response, $captchaInputElement, numberOfTries ) => {
                if ( response == 'success' ) {
                    $("#loginBlock").removeClass('d-none');
                    $("#captchaForm").addClass('d-none');
                }
                if ( response == 'error' ) {
                    $("#captchaInput").removeClass('success');
                    $("#captchaInput").addClass('error');
                    $("#captchaInput").attr('placeholder',  "Please try again!");

                    if (numberOfTries === 3) {
                        // maximum attempts reached, so do something
                        // e.g. disable the form:
                        $("#captchaForm").off("submit", formSubmit);
                        $("#captchaInput").attr('placeholder',  "Maximum attempts reached!");
                        $("#captchaInput").attr("disabled", "true");
                        $("#captchaButton").attr("disabled", "true");
                    }
                }
            }
        });

        function formSubmit(e) {
            e.preventDefault();

            // myCaptcha validate
            myCaptcha.validate();
        }

        $('#captchaForm').on('submit', formSubmit)

    });
</script>
</body>
</html>
