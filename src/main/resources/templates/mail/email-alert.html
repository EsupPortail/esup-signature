<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
</head>
<body>
	<table width="100%" border="0" style="width: 100%; border: 0; font-family: Arial, Helvetica, sans-serif;" bgcolor="#eef2f7">
		<tr>
			<td width="100%" style="background: linear-gradient(135deg, #1f2937 0%, #374151 100%); border: 1px solid #1f2937; margin-bottom:0; padding:14px 18px; width: 100%;" bgcolor="#1f2937">
				<table width="100%" style="border:0; width:100%;">
					<tr>
						<td style="vertical-align:middle; width:50%;">
							<img height="30" src="cid:logo" style="height: 30px; border-style:none; vertical-align:middle;" valign="middle" align="left">
						</td>
						<td style="vertical-align:middle; width:50%; text-align:right;">
							<img height="30" src="cid:logo-univ" style="height: 30px; border-style:none; vertical-align:middle;" valign="middle" align="right">
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr>
			<td style="width:100%; padding:28px 18px 34px; background-color:#eef2f7;">
				<table style="width: 100%; max-width: 760px; margin: 0 auto; border:0;" cellspacing="0" cellpadding="0">
					<tr>
						<td>
							<p style="margin:0 0 14px; text-align:center; color:#111827; font-size:18px; font-weight:700;">Vous avez une nouvelle demande de signature en attente</p>
						</td>
					</tr>
					<tr>
						<td style="background:#ffffff; border:1px solid #dbe4f0; border-radius:18px; padding:24px; box-shadow:0 10px 28px rgba(15,23,42,.08);">
							<table style="width:100%; border:0;" cellspacing="0" cellpadding="0">
								<tr>
									<td style="padding-bottom:16px; border-bottom:1px solid #e5e7eb;">
										<a th:href="${notificationItem.url}" style="text-decoration:none; display:block;">
											<table style="width:100%; border:0;" cellspacing="0" cellpadding="0">
												<tr>
													<td style="width:38px; vertical-align:top; padding-right:12px;">
														<img height="24" src="cid:logo-file" style="display:block; border:0;">
													</td>
													<td style="vertical-align:top;">
														<div style="font-size:15px; font-weight:700; color:#111827; line-height:1.35;" th:text="${notificationItem.title}"></div>
														<div style="font-size:12px; color:#6b7280; margin-top:4px;" th:text="'Demande #' + ${notificationItem.signRequestId}"></div>
													</td>
												</tr>
											</table>
										</a>
									</td>
								</tr>
								<tr th:if="${notificationItem.tags != null and !notificationItem.tags.empty}">
									<td style="padding:18px 0 8px;">
										<table style="width:100%; border:0;" cellspacing="0" cellpadding="0">
											<tr>
												<td>
													<!--[if mso]>
													<table style="border:0; width:100%;" cellspacing="0" cellpadding="0"><tr>
													<![endif]-->
													<div th:each="tag : ${notificationItem.tags}" th:with="rootColor=(${tag.parentTag != null and tag.parentTag.color != null} ? ${tag.parentTag.color} : (${tag.color} != null ? ${tag.color} : '#cbd5e1'))" th:style="'display:inline-block; vertical-align:top; margin:0 8px 12px 0; background:' + ${rootColor} + '1a; border:1px solid ' + ${rootColor} + '; border-radius:14px; padding:12px; min-width:140px;'">
														<div th:style="'font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:' + ${rootColor} + '; font-weight:700;'" th:text="${tag.parentTag != null} ? ${tag.parentTag.name} : 'Tag'">Category</div>
														<div style="font-size:14px; color:#0f172a; font-weight:700; margin-top:6px;" th:text="${tag.name}">Value</div>
													</div>
													<!--[if mso]>
													</tr></table>
													<![endif]-->
												</td>
											</tr>
										</table>
									</td>
								</tr>
								<tr>
									<td style="padding:6px 0 18px; color:#334155; font-size:13px; line-height:1.6;">
										<div><b>Circuit :</b> <span th:text="${signBook.workflowName}"></span></div>
										<div><b>Créé par :</b> <span th:text="${signBook.createBy.firstname} + ' ' + ${signBook.createBy.name}"></span></div>
										<div><b>Date de création :</b> <span th:text="${#dates.format(signBook.createDate, 'dd/MM/yyyy HH:mm')}"></span></div>
										<p style="margin:10px 0 0; color:#6b7280;" th:if="${organizationalUnitLdap != null}">
											Composante : <span th:text="${organizationalUnitLdap.description}"></span>
										</p>
									</td>
								</tr>
								<tr>
									<td style="text-align:center; padding-top:2px;">
										<a th:href="${notificationItem.url}" style="background:#0f62fe; color:#fff; text-decoration:none; border-radius:999px; display:inline-block; font-size:14px; font-weight:700; line-height:1.5; padding:14px 22px;">Accéder au document</a>
									</td>
								</tr>
							</table>
						</td>
					</tr>
				</table>
				<table style="width:100%; max-width:760px; margin:12px auto 0; border:0;" cellspacing="0" cellpadding="0">
					<tr>
						<td style="text-align:center; color:#475569; font-size:12px; line-height:1.6;">
							En cas de doute, copiez-collez l’URL directement dans votre navigateur : <span th:text="${notificationItem.url}"></span>
						</td>
					</tr>
				</table>
				<p style="margin:14px auto 0; max-width:760px; text-align:center; color:#64748b; font-size:12px;">Pour en savoir plus sur l’outil esup-signature, <a href="https://code.gouv.fr/sill/detail?name=Esup-Signature" style="color:#0f62fe; text-decoration:underline;">cliquez ici</a></p>
			</td>
		</tr>
		<tr>
			<td style="width:100%; background-color:#1f2937; border-top: 0; padding:12px; -ms-flex-pack:center; justify-content:center; text-align:center; font-size:14px;" bgcolor="#1f2937">
				<span class="text-white text-center" style="text-align:center; color:#fff" align="center" th:text="#{application.footer}"></span>
			</td>
		</tr>
	</table>
</body>
</html>
