<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
</head>
<body>
<table width="100%" border="0" style="width: 100%; border: 0; font-family: Arial, Helvetica, sans-serif;" bgcolor="#eef2f7">
	<tr>
		<td width="100%" style="background: linear-gradient(135deg, #1f2937 0%, #374151 100%); border: 1px solid #1f2937; margin-bottom:0; padding:14px 18px; width: 100%;" bgcolor="#1f2937">
			<table width="100%" style="border:0; width:100%;">
				<tr>
					<td style="vertical-align:middle; width:50%;">
						<img height="30" src="cid:logo" style="height: 30px; border-style:none; vertical-align:middle;" valign="middle" align="left">
					</td>
					<td style="vertical-align:middle; width:50%; text-align:right;">
						<img height="30" src="cid:logo-univ" style="height: 30px; border-style:none; vertical-align:middle;" valign="middle" align="right">
					</td>
				</tr>
			</table>
		</td>
	</tr>
	<tr>
		<td style="width:100%; padding:28px 18px 34px; background-color:#eef2f7;">
			<table style="width: 100%; max-width: 760px; margin: 0 auto; border:0;" cellspacing="0" cellpadding="0">
				<tr>
					<td>
						<p style="margin:0 0 6px; text-align:center; color:#111827; font-size:18px; font-weight:700;">
							Bonjour <span th:if="${otp != null}" th:text="${otp.user.firstname} + ' ' + ${otp.user.name}"></span>,
						</p>
						<p style="margin:0 0 14px; text-align:center; color:#6b7280; font-size:13px;">
							<span th:text="#{application.footer}"></span> vous invite à signer un document.
						</p>
					</td>
				</tr>
				<tr>
					<td style="background:#ffffff; border:1px solid #dbe4f0; border-radius:18px; padding:24px; box-shadow:0 10px 28px rgba(15,23,42,.08);">
						<table style="width:100%; border:0;" cellspacing="0" cellpadding="0">
							<tr>
								<td style="padding-bottom:16px; border-bottom:1px solid #e5e7eb;">
									<a th:href="${url}" style="text-decoration:none; display:block;">
										<table style="width:100%; border:0;" cellspacing="0" cellpadding="0">
											<tr>
												<td style="width:38px; vertical-align:top; padding-right:12px;">
													<img height="24" src="cid:logo-file" style="display:block; border:0;">
												</td>
												<td style="vertical-align:top;">
													<div style="font-size:15px; font-weight:700; color:#111827; line-height:1.35;" th:text="${signBook.subject}"></div>
													<div style="font-size:12px; color:#6b7280; margin-top:4px;" th:text="${signBook.signRequests.get(0).originalDocuments.get(0).getFileName()}"></div>
												</td>
											</tr>
										</table>
									</a>
								</td>
							</tr>
							<tr>
								<td style="padding:18px 0 8px;">
									<table style="width:100%; border:0;" cellspacing="0" cellpadding="0">
										<tr>
											<td style="padding:0 8px 12px 0; width:33.33%;">
												<div style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:14px; padding:12px;">
													<div style="font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:#2563eb; font-weight:700;">Circuit</div>
													<div style="font-size:14px; color:#0f172a; font-weight:700; margin-top:6px;" th:text="${signBook.workflowName}"></div>
												</div>
											</td>
											<td style="padding:0 8px 12px 0; width:33.33%;">
												<div style="background:#f0fdf4; border:1px solid #bbf7d0; border-radius:14px; padding:12px;">
													<div style="font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:#15803d; font-weight:700;">Créé par</div>
													<div style="font-size:14px; color:#0f172a; font-weight:700; margin-top:6px;" th:text="${signBook.createBy.firstname} + ' ' + ${signBook.createBy.name}"></div>
												</div>
											</td>
											<td style="padding:0 0 12px 0; width:33.33%;">
												<div style="background:#fef2f2; border:1px solid #fecaca; border-radius:14px; padding:12px;">
													<div style="font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:#dc2626; font-weight:700;">Lien valide jusqu'au</div>
													<div style="font-size:14px; color:#0f172a; font-weight:700; margin-top:6px;" th:text="${#dates.format(otpValidity, 'dd/MM/yyyy HH:mm')}"></div>
												</div>
											</td>
										</tr>
									</table>
								</td>
							</tr>
							<tr th:if="${organizationalUnitLdap != null}">
								<td style="padding:0 0 14px; color:#6b7280; font-size:12px; border-top:1px solid #e5e7eb; padding-top:10px;">
									Composante : <span th:text="${organizationalUnitLdap.description}"></span>
								</td>
							</tr>
							<tr>
								<td style="text-align:center; padding-top:4px;">
									<a th:href="${url}" style="background:#0f62fe; color:#fff; text-decoration:none; border-radius:999px; display:inline-block; font-size:14px; font-weight:700; line-height:1.5; padding:14px 22px;">Accéder au document</a>
								</td>
							</tr>
						</table>
					</td>
				</tr>
			</table>
			<table style="width:100%; max-width:760px; margin:12px auto 0; border:0;" cellspacing="0" cellpadding="0">
				<tr>
					<td style="text-align:center; color:#475569; font-size:12px; line-height:1.6;">
						En cas de doute, copiez-collez l'URL directement dans votre navigateur : <span th:text="${url}"></span>
					</td>
				</tr>
			</table>
			<p style="margin:14px auto 0; max-width:760px; text-align:center; color:#64748b; font-size:12px;">Pour en savoir plus sur l'outil esup-signature, <a href="https://code.gouv.fr/sill/detail?name=Esup-Signature" style="color:#0f62fe; text-decoration:underline;">cliquez ici</a></p>
		</td>
	</tr>
	<tr>
		<td style="width:100%; background-color:#1f2937; border-top: 0; padding:12px; -ms-flex-pack:center; justify-content:center; text-align:center; font-size:14px;" bgcolor="#1f2937">
			<span style="text-align:center; color:#fff" align="center" th:text="#{application.footer}"></span>
		</td>
	</tr>
</table>
</body>
</html>
