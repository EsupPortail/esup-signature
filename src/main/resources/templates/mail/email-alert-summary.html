<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
</head>
<body>
<table width="100%" border="0" style="width: 100%; border: 0; font-family: Arial, Helvetica, sans-serif;" bgcolor="#eef2f7">
	<tr>
		<td width="100%" style="background: linear-gradient(135deg, #1f2937 0%, #374151 100%); border-bottom:1px solid rgba(0, 0, 0, 0.125); margin-bottom:0; padding:14px 18px; width: 100%;" bgcolor="#1f2937">
			<table width="100%" style="border:0; width:100%;">
				<tr>
					<td style="vertical-align:middle; width:50%;">
						<img height="30" src="cid:logo" style="height: 30px; border-style:none; vertical-align:middle;" valign="middle" align="left">
					</td>
					<td style="vertical-align:middle; width:50%; text-align:right;">
						<img height="30" src="cid:logo-univ" style="height: 30px; border-style:none; vertical-align:middle;" valign="middle" align="right">
					</td>
				</tr>
			</table>
		</td>
	</tr>
	<tr>
		<td style="width:100%; padding:28px 18px 34px;background-color:#eef2f7;">
			<table style="width:100%; max-width:980px; margin:0 auto; border:0;" cellspacing="0" cellpadding="0">
				<tr>
					<td style="text-align:center; padding-bottom:14px;">
						<p style="margin:0; color:#111827; font-size:18px; font-weight:700;">Voici la liste des demandes de signatures en attente</p>
					</td>
				</tr>
			</table>
			<table style="width:100%; max-width:980px; margin:0 auto; border:0;" cellspacing="0" cellpadding="0">
				<tr>
					<td>
						<table style="width:100%; border-collapse:separate; border-spacing:0 14px;">
							<th:block th:each="notificationItem : ${notificationItems}">
								<tr>
									<td style="background:#ffffff; border:1px solid #dbe4f0; border-radius:18px; padding:18px 20px; box-shadow:0 10px 28px rgba(15,23,42,.08);">
										<table style="width:100%; border:0;" cellspacing="0" cellpadding="0">
											<tr>
												<td style="vertical-align:top; padding-right:14px; width:34px;">
													<img height="24" src="cid:logo-file" style="display:block; border:0;">
												</td>
												<td style="vertical-align:top;">
													<div style="font-size:15px; font-weight:700; color:#111827; line-height:1.35;" th:text="${notificationItem.title}"></div>
													<div style="font-size:12px; color:#6b7280; margin-top:4px;" th:text="'Demande #' + ${notificationItem.signRequestId}"></div>
												</td>
												<td style="vertical-align:top; text-align:right;">
													<a th:href="${notificationItem.url}" style="background:#0f62fe; color:#fff; text-decoration:none; border-radius:999px; display:inline-block; font-size:13px; font-weight:700; line-height:1.5; padding:12px 18px;">Ouvrir</a>
												</td>
											</tr>
										</table>
										<table th:if="${notificationItem.tags != null and !notificationItem.tags.empty}" style="width:100%; border:0; margin-top:14px;" cellspacing="0" cellpadding="0">
											<tr>
												<td>
													<!--[if mso]>
													<table style="border:0; width:100%;" cellspacing="0" cellpadding="0"><tr>
													<![endif]-->
													<div th:each="tag : ${notificationItem.tags}" th:with="rootColor=(${tag.parentTag != null and tag.parentTag.color != null} ? ${tag.parentTag.color} : (${tag.color} != null ? ${tag.color} : '#cbd5e1'))" th:style="'display:inline-block; vertical-align:top; margin:0 8px 12px 0; background:' + ${rootColor} + '1a; border:1px solid ' + ${rootColor} + '; border-radius:14px; padding:12px; min-width:140px;'">
														<div th:style="'font-size:11px; letter-spacing:.04em; text-transform:uppercase; color:' + ${rootColor} + '; font-weight:700;'" th:text="${tag.parentTag != null} ? ${tag.parentTag.name} : 'Tag'">Category</div>
														<div style="font-size:14px; color:#0f172a; font-weight:700; margin-top:6px;" th:text="${tag.name}">Value</div>
													</div>
													<!--[if mso]>
													</tr></table>
													<![endif]-->
												</td>
											</tr>
										</table>
										<table style="width:100%; border:0; margin-top:10px; color:#334155; font-size:13px; line-height:1.6;">
											<tr>
												<td><b>Créé par :</b> <span th:text="${notificationItem.createdBy}"></span></td>
												<td><b>Date :</b> <span th:text="${notificationItem.createdAt}"></span></td>
											</tr>
										</table>
									</td>
								</tr>
							</th:block>
						</table>
					</td>
				</tr>
			</table>
			<p style="margin:14px auto 0; max-width:980px; text-align:center; color:#64748b; font-size:12px;">Pour en savoir plus sur l’outil esup-signature, <a href="https://code.gouv.fr/sill/detail?name=Esup-Signature" style="color:#0f62fe; text-decoration:underline;">cliquez ici</a></p>
		</td>
	</tr>
	<tr>
		<td style="width:100%; background-color:#1f2937;  padding:12px;  -ms-flex-pack:center; justify-content:center; text-align:center; font-size:14px;" bgcolor="#1f2937">
			<span class="text-white text-center" style="text-align:center; color:#fff" align="center" th:text="#{application.footer}"></span>
		</td>
	</tr>
</table>
</body>
</html>
