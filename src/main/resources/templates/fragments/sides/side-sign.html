<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="showSignRequest" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto"*/-->
<!--/*@thymesVar id="signRequestFull" type="org.esupportail.esupsignature.dto.page.user.signrequest.SignRequestFullDto"*/-->
<!--/*@thymesVar id="signRequestLight" type="org.esupportail.esupsignature.dto.page.user.signrequest.ShowSignRequestDto.SignRequestLightDto"*/-->
<nav th:fragment="side-sign" id="sidebar" class="scrollbar-lite scrollbar-style p-1 d-flex flex-column gap-1" style="z-index: 1000;">
    <div class="d-flex justify-content-between align-items-center" th:if="${signRequestLight != null}">
        <span class="text-uppercase ms-1">Statut</span>
        <div class="pe-2">
            <div th:insert="~{user/signbooks/includes/status :: status(signBookLight=${showSignRequest.signBookLight})}"></div>
        </div>
    </div>
    <div class="alert bg-light m-1">
        <th:block th:if="${signRequestLight != null}">
            <!-- Archive Status Badge -->
            <div class="text-center" th:if="${showSignRequest.signBookLight.archiveStatus != null && showSignRequest.signBookLight.archiveStatus.name != 'none'}">
            <span class="badge rounded-pill bg-secondary">
                <i class="fi fi-rr-box"></i>
                <span th:text="#{'signbook.archivestatus.' + ${showSignRequest.signBookLight.archiveStatus}}"></span>
            </span>
            </div>

            <!-- Creator Info -->
            <div class="d-flex align-items-start gap-1" th:if="${signRequestLight != null}">
                <div class="rounded-circle text-white d-flex align-items-center justify-content-center fw-semibold"
                     style="width: 2rem; height: 2rem; flex-shrink: 0; font-size: 0.75rem;"
                     th:with="firstInitial=${signRequestLight.createBy.firstname != null && !#strings.isEmpty(signRequestLight.createBy.firstname) ? #strings.substring(signRequestLight.createBy.firstname, 0, 1) : ''},
                              lastInitial=${signRequestLight.createBy.name != null && !#strings.isEmpty(signRequestLight.createBy.name) ? #strings.substring(signRequestLight.createBy.name, 0, 1) : ''},
                              initials=${#strings.toUpperCase(firstInitial + lastInitial)},
                              userId=${signRequestLight.createBy.id != null ? signRequestLight.createBy.id : 0},
                              hue=${T(java.lang.Math).abs(userId) % 360}"
                     th:styleappend="'background-color: hsl(' + ${hue} + ', 70%, 60%);'"
                     th:text="${!#strings.isEmpty(initials) ? initials : '?'}">
                    ??
                </div>
                <div class="d-flex flex-column">
                    <span class="mb-1 fw-semibold" th:text="${signRequestLight.createBy.firstname + ' ' + signRequestLight.createBy.name}"></span>
                    <span class="small bg-primary-subtle pe-1 ps-1" style="font-size: 12px; width: fit-content;" th:text="${#dates.format(showSignRequest.signBookLight.createDate, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
            </div>

            <!-- Viewers Section -->
            <th:block th:if="${showSignRequest.signBookLight.viewers.size() > 0}">
                <div class="m-1" style="border-top: 1px solid var(--color-dee2e6);">
                    <a class="mb-2" style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase;"
                       data-bs-toggle="collapse" href="#followed-by" role="button" aria-expanded="false" aria-controls="followed-by">Suivi par :</a>
                    <div id="followed-by" class="collapse">
                    <ul class="d-flex gap-1 list-unstyled mb-0">
                        <li th:each="user, iterator : ${showSignRequest.signBookLight.viewers}">
                            <div class="rounded-circle text-white d-flex align-items-center justify-content-center fw-semibold"
                                 style="width: 2rem; height: 2rem; font-size: 0.75rem;"
                                 th:with="firstInitial=${user.firstname != null && !#strings.isEmpty(user.firstname) ? #strings.substring(user.firstname, 0, 1) : ''},
                              lastInitial=${user.name != null && !#strings.isEmpty(user.name) ? #strings.substring(user.name, 0, 1) : ''},
                              initials=${#strings.toUpperCase(firstInitial + lastInitial)},
                              userId=${user.id != null ? user.id : 0},
                              hue=${T(java.lang.Math).abs(userId) % 360}"
                                 th:styleappend="'background-color: hsl(' + ${hue} + ', 70%, 60%);'"
                                 th:text="${!#strings.isEmpty(initials) ? initials : '?'}"
                                 th:title="${user.firstname} + ' ' + ${user.name} + ' (' + ${user.email} + ')'">
                                ??
                            </div>
<!--                            <span th:if="${user.firstname != '' && user.name != ''}" th:text="${user.firstname + ' ' + user.name}"></span>-->
<!--                            <span th:unless="${user.firstname != '' && user.name != ''}" th:text="${user.email}"></span>-->
                        </li>
                    </ul>
                    </div>
                </div>
            </th:block>
        </th:block>

        <th:block th:unless="${signRequestLight != null}">
            <div th:insert="~{user/signbooks/includes/status :: status(signBookLight=${showSignRequest.signBookLight})}"></div>
        </th:block>
    </div>
<!--        <div class="hr sidebar-label" th:if="${toSignDocument != null && toSignDocument.contentType == 'application/pdf'}">Changer de mode</div>-->
<!--        <button data-bs-toggle="modal" data-bs-target="#signAllModal"-->
<!--                class="btn btn-light col-3 col-md-12 mb-1 text-left d-none"-->
<!--                th:classappend="${signable != 'ok' || nbSignRequestInSignBookParent < 2} ? 'd-none' ">-->
<!--            <i class="fa-solid fa-bolt"></i> <span class="sidebar-label">Tout signer</span>-->
<!--        </button>-->
<!--        <button id="signModeButton" class="btn btn-light col-12 mb-1 text-left" th:if="${signRequest != null && signable}">-->
<!--            <i style="font-size: 0.6rem;" class="fa-solid fa-signature"></i><i class="fa-solid fa-pen"></i> <span class="sidebar-label">Remplir et signer</span>-->
<!--        </button>-->
<!--        <button th:if="${toSignDocument != null && toSignDocument.contentType == 'application/pdf'}" id="commentModeButton" class="btn btn-light col-12 mb-1 text-left">-->
<!--            <i class="ms-1 fa-solid fa-comment"></i><i class="me-2"></i> <span class="sidebar-label">Annoter</span>-->
<!--            <span th:if="${signRequest.comments.size() > 0}" class="float-end badge rounded-pill bg-warning mt-1" ><span th:text="${signRequest.comments.size()}"></span></span>-->
<!--        </button>-->
    <div th:if="${signRequestLight != null && signRequestFull.comments.size() > 0}" th:insert="~{user/signrequests/cards/comments :: comments}"></div>
    <span th:if="${signRequestLight != null}" class="text-uppercase ms-1">Étapes du circuit</span>
    <div th:if="${signRequestLight != null}" th:insert="~{user/signrequests/cards/stepscard :: stepscard}"></div>

    <div th:if="${signRequestLight != null and signRequestFull.manager and (signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).draft or signRequestLight.status == T(org.esupportail.esupsignature.entity.enums.SignRequestStatus).pending)}"
         data-bs-focus="false"
         class="modal fade"
         id="addStep"
         role="dialog"
         aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <form th:action="'/user/signbooks/add-live-step/' + ${showSignRequest.signBookLight.id}" method="post">
                    <div class="modal-header">
                        <h3 class="modal-title">Ajouter une étape</h3>
                        <button type="button" class="btn-close" title="Fermer" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="stepNumber" id="stepNumber" value="-1">
                        <div id="addStepPositionLabel" class="alert alert-secondary py-2 mb-3">L’étape sera ajoutée à la fin du circuit.</div>
                        <div class="form-group mb-3" id="_signType_div_id">
                            <div class="form-check form-switch form-switch-md mb-3">
                                <input type="checkbox" class="form-check-input" id="autoSign" name="autoSign" />
                                <label for="autoSign" class="form-check-label">
                                    L'étape est en cachet d’établissement automatique
                                </label>
                            </div>
                            <div class="form-group mb-3" id="recipients-div">
                                <label for="recipientsEmails2">Choisir les participants *</label>
                                <div class="form-group mb-3">
                                    <select data-es-check-list="true" name="recipientsEmails" id="recipientsEmails2" multiple="multiple" required="required"></select>
                                    <div id="tempUsers-recipientsEmails2"></div>
                                </div>
                            </div>
                            <div class="form-group mb-3" id="all-sign-to-complete-div">
                                <div class="form-check form-switch form-switch-md">
                                    <label class="form-check-label" for="all-sign-to-complete">Tous les participants doivent signer pour valider l'étape</label>
                                    <input type="checkbox" class="form-check-input" name="allSignToComplete" id="all-sign-to-complete"/>
                                </div>
                            </div>
                            <div class="form-group mb-3" id="sign-type-div">
                                <label for="signType_id">Type de signature</label>
                                <select class="slim-select-simple" id="signType_id" name="signType" size="1">
                                    <th:block th:each="signType : ${signTypes}">
                                        <option th:value="${signType}" th:text="#{'signbook.signtype.' + ${signType}}"></option>
                                    </th:block>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-success">Enregistrer</button>
                    </div>
                </form>
                <script th:inline="javascript" type="module">
                    import {default as SelectUser} from '/js/modules/utils/SelectUser.js?version=@[(${versionApp})]@';

                    const csrf = /*[[${_csrf}]]*/ {};
                    new SelectUser("recipientsEmails2", null, null, csrf);

                    const addStepModal = document.getElementById('addStep');
                    const autoSignCheckbox = document.getElementById('autoSign');
                    const stepNumberInput = document.getElementById('stepNumber');
                    const positionLabel = document.getElementById('addStepPositionLabel');
                    const recipientsDiv = $('#recipients-div');
                    const recipientsSelect = $('#recipientsEmails2');
                    const allSignDiv = $('#all-sign-to-complete-div');
                    const signTypeDiv = $('#sign-type-div');

                    function updateAddStepPositionLabel(stepNumber) {
                        if (!positionLabel) {
                            return;
                        }
                        if (stepNumber === 0) {
                            positionLabel.textContent = 'L’étape sera ajoutée au début du circuit.';
                        } else if (stepNumber === -1) {
                            positionLabel.textContent = 'L’étape sera ajoutée à la fin du circuit.';
                        } else {
                            positionLabel.textContent = 'L’étape sera ajoutée après l’étape ' + stepNumber + '.';
                        }
                    }

                    function toggleAddStepAutoSign(isChecked) {
                        allSignDiv.toggleClass('d-none', isChecked);
                        signTypeDiv.toggleClass('d-none', isChecked);
                        recipientsDiv.toggleClass('d-none', isChecked);
                        if (isChecked) {
                            recipientsSelect.removeAttr('required');
                        } else {
                            recipientsSelect.attr('required', 'required');
                        }
                    }

                    autoSignCheckbox?.addEventListener('change', function() {
                        if (this.checked) {
                            bootbox.confirm('Attention tous les paramètres de cette étape seront perdus après la validation', function(result) {
                                if (result) {
                                    toggleAddStepAutoSign(true);
                                } else {
                                    autoSignCheckbox.checked = false;
                                    toggleAddStepAutoSign(false);
                                }
                            });
                        } else {
                            toggleAddStepAutoSign(false);
                        }
                    });

                    addStepModal?.addEventListener('show.bs.modal', function(event) {
                        const trigger = event.relatedTarget;
                        const requestedStepNumber = Number.parseInt(trigger?.getAttribute('data-step-number') ?? '-1', 10);
                        const normalizedStepNumber = Number.isNaN(requestedStepNumber) ? -1 : requestedStepNumber;
                        stepNumberInput.value = normalizedStepNumber;
                        updateAddStepPositionLabel(normalizedStepNumber);
                        toggleAddStepAutoSign(autoSignCheckbox?.checked === true);
                    });

                    updateAddStepPositionLabel(Number.parseInt(stepNumberInput?.value ?? '-1', 10));
                    toggleAddStepAutoSign(autoSignCheckbox?.checked === true);
                </script>
            </div>
        </div>
    </div>
</nav>
</html>
