<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<!--/*@thymesVar id="SignRequestStatus" type="org.esupportail.esupsignature.entity.enums.SignRequestStatus"*/-->
<!--/*@thymesVar id="globalProperties" type="org.esupportail.esupsignature.config.GlobalProperties"*/-->
<nav th:fragment="side-admin" id="sidebar" th:if="${adminMenu == 'active'}">
    <div class="d-flex flex-column gap-1 ms-1 mt-2">
        <div class="hr"><span class="sidebar-label"> Supervision</span></div>
        <a th:classappend="${activeMenu == 'adminsignrequests'} ? 'bg-dark-subtle' : 'text-dark btn-transparent'"
            type="button" href="/admin/signbooks" class="btn text-left rounded-2 d-flex align-items-center gap-2">
            <i class="fi fi-rr-ballot"></i> <span class="sidebar-label">Toutes les demandes</span>
        </a>
        <a th:classappend="${activeMenu == 'logs'} ? 'bg-dark-subtle' : 'text-dark btn-transparent'"

            <i class="fi fi-rr-overview"></i> <span class="sidebar-label">Logs</span>
        </a>
        <a th:classappend="${activeMenu == 'users'} ? 'bg-dark-subtle' : 'text-dark btn-transparent'"

            <i class="fi fi-rr-users-alt"></i> <span class="sidebar-label">Utilisateurs</span>
        </a>
        <a th:classappend="${activeMenu == 'charts'} ? 'bg-dark-subtle' : 'text-dark btn-transparent'"
            type="button" href="/admin/charts" class="btn text-left rounded-2 d-flex align-items-center gap-2">
            <i class="fi fi-rr-chart-histogram"></i> <span class="sidebar-label">Statistiques</span>
        </a>
        <a th:classappend="${activeMenu == 'export'} ? 'bg-dark-subtle' : 'text-dark btn-transparent'"

        </a>
        <div class="hr"><span class="sidebar-label"> Paramétrage</span></div>
        <a th:classappend="${activeMenu == 'workflows'} ? 'bg-dark-subtle' : 'text-dark btn-transparent'"
            href="/admin/workflows" class="btn text-left rounded-2 d-flex align-items-center gap-2">
            <i class="fi fi-rr-diagram-project project-diagram-color"></i> <span class="sidebar-label">Circuits</span>
        </a>
        <a th:classappend="${activeMenu == 'forms'} ? 'bg-dark-subtle' : 'text-dark btn-transparent'"

            <i class="fi fi-rr-spy"></i> <span class="sidebar-label">Switch user</span>
        </a>

        </a>
