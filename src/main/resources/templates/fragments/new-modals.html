<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="new-modals" class="w-100" th:with="isUserOnSu = ${userEppn != authUserEppn}">
    <div data-bs-backdrop="static" data-bs-focus="false" data-es-focus-target=".btn-file, .file-drop-zone, #fast-sign-button, #fast-form-close" class="modal modal-xl fade" id="wiz-self-sign-modal" th:unless="${globalProperties.hideAutoSign}"  role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div id="wiz-self-sign-div" class="wiz-transition">
                </div>
            </div>
        </div>
    </div>

    <div data-bs-backdrop="static" data-bs-focus="false" data-es-focus-target="#title, #multipartFiles, #send-draft-button, #send-pending-button, #fast-form-close" class="modal modal-xl fade" id="wiz-fast-sign-modal" th:unless="${globalProperties.hideSendSignRequest}" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div id="wiz-fast-sign-div" class="wiz-transition">
                </div>
            </div>
        </div>
    </div>

    <div data-bs-backdrop="static" data-bs-focus="false" data-es-focus-target="#title-wiz, input[id^='multipartFiles_'], #wiz-start-button, #fast-form-close" class="modal modal-xl fade" id="wiz-custom-sign-modal" th:unless="${globalProperties.hideWizard}" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div id="wiz-custom-sign-div" class="wiz-transition"></div>
            </div>
        </div>
    </div>

    <div data-bs-backdrop="static" data-bs-focus="false" data-es-focus-target="#title-wiz, input[id^='multipartFiles_'], #wiz-start-button, #fast-form-close" class="modal modal-xl fade" id="wiz-workflow-sign-modal" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div id="wiz-workflow-sign-div" class="wiz-transition"></div>
            </div>
        </div>
    </div>

    <div data-bs-backdrop="static" data-bs-focus="false" data-es-focus-target="#title-wiz, input[id^='multipartFiles_'], #wiz-start-button, #fast-form-close" class="modal modal-xl fade" id="wiz-modal" th:unless="${globalProperties.hideWizard}" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div id="wiz-div" class="wiz-transition"></div>
            </div>
        </div>
    </div>

    <div data-bs-backdrop="static" data-bs-focus="false" data-es-focus-target="#title, #send-form-button, #fast-form-close" class="modal modal-xl fade" id="wiz-start-form-modal"  role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div id="wiz-start-form-div" class="wiz-transition"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="allModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-xl" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Circuits et formulaires</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div th:replace="~{fragments/new-all :: new-all}"></div>
                </div>
            </div>
        </div>
    </div>

</div>
</html>
