<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<!--/*@thymesVar id="securityServices" type="java.util.List<org.esupportail.esupsignature.service.security.SecurityService>"*/-->
<head th:replace="~{fragments/head-lite :: head}"></head>
<body>
<header th:replace="~{fragments/nav-empty :: nav-empty}"></header>
<main role="main">
    <div class="es-wrapper">
        <div id="content" class="es-content-full">
            <div class="es-auth-page">
                <div class="alert alert-light es-auth-card">
                    <div class="es-auth-illustration es-auth-illustration--timeout"></div>

                    <h4>Vous êtes bien déconnecté(e)</h4>

                    <p class="es-auth-description">
                        Votre session a été fermée. Vous pouvez vous reconnecter pour reprendre votre activité.
                    </p>

                    <div class="es-auth-form">
                        <a href="/" class="es-auth-button">
                            Se reconnecter
                        </a>
                    </div>

                    <div class="es-auth-panel es-auth-panel--primary">
                        <p>Si vous n’avez plus besoin de cette session, vous pouvez aussi fermer cet onglet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer-light :: footer}"></footer>
</body>
</html>
